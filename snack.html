<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE - Retro Arcade</title>
    
    <!-- PeerJS for multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        /* 
         * VISUAL STYLE BREAKDOWN
         * ======================
         * Color Palette: Inspired by classic Game Boy with modern contrast
         * - Background: Deep navy (#0f0f23) - reduces eye strain
         * - Grid: Subtle lines (#1a1a2e) - visible but not distracting
         * - Snake Head: Bright lime (#00ff41) - instant visibility
         * - Snake Body: Darker green (#00b330) - clear head distinction
         * - Food: Hot red (#ff0040) - high contrast against greens
         * - UI Text: Off-white (#e0e0e0) - readable without harsh white
         * 
         * Grid: 20x20 cells at 20px each = 400x400 logical pixels
         * Pixel Scale: 1x base, CSS handles responsive scaling
         */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a14;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px 0;
            font-family: 'Courier New', monospace;
            color: #e0e0e0;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            width: 400px;
            padding: 8px 0;
        }
        
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #00ff41;
            text-shadow: 0 0 10px #00ff4166;
            letter-spacing: 4px;
        }
        
        .score-display {
            font-size: 20px;
            color: #ffcc00;
            text-shadow: 0 0 8px #ffcc0044;
        }
        
        .canvas-wrapper {
            position: relative;
            /* Pixel-perfect rendering: disable smoothing via CSS */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #gameCanvas {
            display: block;
            background: #0f0f23;
            border: 3px solid #00ff41;
            box-shadow: 
                0 0 20px #00ff4133,
                inset 0 0 60px #00000066;
            /* Pixel-perfect: no antialiasing */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* Optional CRT scanline effect */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            opacity: 0.3;
        }
        
        .controls-info {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 8px;
        }
        
        .controls-info kbd {
            background: #1a1a2e;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #333;
            color: #888;
        }
        
        /* Mobile touch controls */
        .touch-controls {
            display: none;
            margin-top: 16px;
            gap: 8px;
        }
        
        .touch-row {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        
        .touch-btn {
            width: 60px;
            height: 60px;
            background: #1a1a2e;
            border: 2px solid #00ff41;
            color: #00ff41;
            font-size: 24px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .touch-btn:active {
            background: #00ff4133;
        }
        
        .touch-btn.spacer {
            visibility: hidden;
        }
        
        /* Difficulty selection */
        .difficulty-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .difficulty-btn {
            padding: 8px 16px;
            background: #1a1a2e;
            border: 2px solid #333;
            color: #888;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .difficulty-btn:hover {
            border-color: #00ff41;
            color: #00ff41;
        }
        
        .difficulty-btn.active {
            background: #00ff4122;
            border-color: #00ff41;
            color: #00ff41;
            box-shadow: 0 0 10px #00ff4133;
        }
        
        .difficulty-btn.easy {
            --accent: #00ff41;
        }
        
        .difficulty-btn.medium {
            --accent: #ffcc00;
        }
        
        .difficulty-btn.hard {
            --accent: #ff6600;
        }
        
        .difficulty-btn.insane {
            --accent: #ff0040;
        }
        
        .difficulty-btn.active.easy {
            border-color: #00ff41;
            color: #00ff41;
            background: #00ff4122;
        }
        
        .difficulty-btn.active.medium {
            border-color: #ffcc00;
            color: #ffcc00;
            background: #ffcc0022;
        }
        
        .difficulty-btn.active.hard {
            border-color: #ff6600;
            color: #ff6600;
            background: #ff660022;
        }
        
        .difficulty-btn.active.insane {
            border-color: #ff0040;
            color: #ff0040;
            background: #ff004022;
        }
        
        .level-indicator {
            font-size: 12px;
            color: #666;
        }
        
        /* Stats bar below header */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 400px;
            padding: 4px 0;
            font-size: 12px;
        }
        
        .high-score {
            color: #ff6600;
        }
        
        .speed-indicator {
            color: #00b330;
        }
        
        .combo-display {
            color: #ff0040;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .combo-display.active {
            opacity: 1;
            animation: comboPulse 0.3s ease-out;
        }
        
        @keyframes comboPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* Sound toggle button */
        .sound-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            background: #1a1a2e;
            border: 2px solid #333;
            color: #00ff41;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }
        
        .sound-toggle:hover {
            border-color: #00ff41;
        }
        
        .sound-toggle.muted {
            color: #ff0040;
            border-color: #ff0040;
        }
        
        /* Screen shake animation */
        .canvas-wrapper.shake {
            animation: screenShake 0.4s ease-out;
        }
        
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-4px, -2px) rotate(-1deg); }
            20% { transform: translate(4px, 2px) rotate(1deg); }
            30% { transform: translate(-4px, 2px) rotate(-1deg); }
            40% { transform: translate(4px, -2px) rotate(1deg); }
            50% { transform: translate(-2px, 2px) rotate(-0.5deg); }
            60% { transform: translate(2px, -2px) rotate(0.5deg); }
            70% { transform: translate(-2px, 0) rotate(0deg); }
            80% { transform: translate(2px, 0) rotate(0deg); }
            90% { transform: translate(0, 0) rotate(0deg); }
        }
        
        /* Countdown overlay */
        .countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 15, 35, 0.85);
            z-index: 5;
            pointer-events: none;
        }
        
        .countdown-number {
            font-size: 80px;
            font-weight: bold;
            color: #00ff41;
            text-shadow: 0 0 20px #00ff41;
            animation: countdownPop 0.5s ease-out;
        }
        
        .countdown-number.go {
            font-size: 48px;
            color: #ffcc00;
            text-shadow: 0 0 20px #ffcc00;
        }
        
        @keyframes countdownPop {
            0% { transform: scale(2); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @media (hover: none) and (pointer: coarse) {
            .touch-controls {
                display: flex;
                flex-direction: column;
            }
            .controls-info {
                display: none;
            }
        }
        
        @media (max-width: 440px) {
            #gameCanvas {
                width: 320px;
                height: 320px;
            }
            .header {
                width: 320px;
            }
            .title {
                font-size: 18px;
            }
            .stats-bar {
                width: 320px;
                font-size: 10px;
            }
            .mode-selector, .theme-selector {
                flex-wrap: wrap;
                width: 320px;
            }
        }
        
        /* ==================== GAME MODE SELECTOR ==================== */
        .mode-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
            max-width: 420px;
            justify-content: center;
        }
        
        .mode-btn {
            padding: 6px 10px;
            background: #1a1a2e;
            border: 2px solid #333;
            color: #888;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .mode-btn:hover {
            border-color: #00ff41;
            color: #00ff41;
        }
        
        .mode-btn.active {
            background: #00ff4122;
            border-color: #00ff41;
            color: #00ff41;
        }
        
        /* ==================== THEME SELECTOR ==================== */
        .theme-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .theme-btn {
            width: 28px;
            height: 28px;
            border: 2px solid #333;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            position: relative;
        }
        
        .theme-btn:hover {
            transform: scale(1.1);
        }
        
        .theme-btn.active {
            border-color: #fff;
            box-shadow: 0 0 8px currentColor;
        }
        
        .theme-btn.retro { background: linear-gradient(135deg, #00ff41, #00b330); }
        .theme-btn.gameboy { background: linear-gradient(135deg, #9bbc0f, #306230); }
        .theme-btn.c64 { background: linear-gradient(135deg, #4040e0, #7c7cfc); }
        .theme-btn.amber { background: linear-gradient(135deg, #ffb000, #805800); }
        .theme-btn.neon { background: linear-gradient(135deg, #ff00ff, #00ffff); }
        .theme-btn.grayscale { background: linear-gradient(135deg, #ffffff, #666666); }
        
        /* ==================== LEVEL & TIMER DISPLAY ==================== */
        .game-info-bar {
            display: flex;
            justify-content: space-between;
            width: 400px;
            font-size: 11px;
            color: #888;
            padding: 4px 0;
        }
        
        .level-display {
            color: #00ff41;
        }
        
        .timer-display {
            color: #ffcc00;
            font-weight: bold;
        }
        
        .timer-display.warning {
            color: #ff6600;
            animation: timerBlink 0.5s infinite;
        }
        
        .timer-display.critical {
            color: #ff0040;
            animation: timerBlink 0.25s infinite;
        }
        
        @keyframes timerBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* ==================== POWER-UP INDICATORS ==================== */
        .powerup-bar {
            display: flex;
            gap: 8px;
            height: 24px;
            align-items: center;
        }
        
        .powerup-indicator {
            display: none;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            animation: powerupPulse 1s infinite;
        }
        
        .powerup-indicator.active {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .powerup-indicator.ghost {
            background: #8800ff44;
            color: #cc88ff;
            border: 1px solid #8800ff;
        }
        
        .powerup-indicator.speed {
            background: #ffcc0044;
            color: #ffcc00;
            border: 1px solid #ffcc00;
        }
        
        .powerup-indicator.slow {
            background: #00ccff44;
            color: #00ccff;
            border: 1px solid #00ccff;
        }
        
        .powerup-indicator.multiplier {
            background: #ff660044;
            color: #ff9900;
            border: 1px solid #ff6600;
        }
        
        @keyframes powerupPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* ==================== ACCESSIBILITY TOGGLE ==================== */
        .accessibility-toggle {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 36px;
            height: 36px;
            background: #1a1a2e;
            border: 2px solid #333;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }
        
        .accessibility-toggle:hover {
            border-color: #00ff41;
            color: #00ff41;
        }
        
        .accessibility-toggle.active {
            border-color: #ffcc00;
            color: #ffcc00;
            background: #ffcc0022;
        }
        
        /* ==================== SURVIVAL MODE WALLS ==================== */
        .survival-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0040;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0040;
            animation: warningPulse 0.5s infinite;
            pointer-events: none;
            z-index: 5;
            display: none;
        }
        
        .survival-warning.active {
            display: block;
        }
        
        @keyframes warningPulse {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
        }
        
        /* ==================== SPECIAL MODE BUTTONS ==================== */
        .mode-btn.boss {
            background: linear-gradient(135deg, #ff4040, #8b0000);
            border-color: #ff4040;
            color: #fff;
        }
        .mode-btn.boss:hover, .mode-btn.boss.active {
            background: linear-gradient(135deg, #ff6060, #aa2222);
            box-shadow: 0 0 10px #ff4040;
        }
        
        .mode-btn.ghost {
            background: linear-gradient(135deg, #9966ff, #663399);
            border-color: #9966ff;
            color: #fff;
        }
        .mode-btn.ghost:hover, .mode-btn.ghost.active {
            background: linear-gradient(135deg, #aa88ff, #7744aa);
            box-shadow: 0 0 10px #9966ff;
        }
        
        .mode-btn.mp {
            background: linear-gradient(135deg, #00bfff, #0066cc);
            border-color: #00bfff;
            color: #fff;
        }
        .mode-btn.mp:hover, .mode-btn.mp.active {
            background: linear-gradient(135deg, #33ccff, #0088dd);
            box-shadow: 0 0 10px #00bfff;
        }
        
        /* ==================== MULTIPLAYER PANEL ==================== */
        .multiplayer-panel {
            background: #1a1a2e;
            border: 2px solid #00bfff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 400px;
        }
        
        .mp-status {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 4px 8px;
            background: #0d0d15;
            border-radius: 4px;
        }
        
        .mp-status.connected {
            color: #00ff41;
            background: #00ff4122;
        }
        
        .mp-status.waiting {
            color: #ffcc00;
            background: #ffcc0022;
        }
        
        .mp-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .mp-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #00bfff, #0066cc);
            border: none;
            border-radius: 4px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .mp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #00bfff;
        }
        
        .mp-btn.small {
            padding: 6px 10px;
            font-size: 11px;
        }
        
        .mp-code-container {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        
        .mp-code-input {
            background: #0d0d15;
            border: 2px solid #333;
            border-radius: 4px;
            color: #00bfff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 6px 10px;
            text-align: center;
            width: 120px;
            text-transform: uppercase;
        }
        
        .mp-code-input:focus {
            outline: none;
            border-color: #00bfff;
        }
        
        .mp-game-code {
            text-align: center;
            color: #00ff41;
            font-size: 14px;
            padding: 8px;
            background: #00ff4122;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .mp-game-code span {
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .mp-opponent {
            text-align: center;
            color: #ff6666;
            font-size: 12px;
            padding: 6px;
            background: #ff666622;
            border-radius: 4px;
        }
        
        /* ==================== SKIN SELECTOR ==================== */
        .skin-selector {
            position: relative;
            margin-bottom: 8px;
        }
        
        .skin-toggle {
            padding: 6px 14px;
            background: linear-gradient(135deg, #ff9900, #cc6600);
            border: 2px solid #ff9900;
            border-radius: 4px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .skin-toggle:hover {
            box-shadow: 0 0 10px #ff9900;
        }
        
        .skin-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: #1a1a2e;
            border: 2px solid #ff9900;
            border-radius: 8px;
            padding: 10px;
            margin-top: 4px;
            z-index: 100;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            min-width: 220px;
        }
        
        .skin-option {
            width: 48px;
            height: 48px;
            border: 2px solid #333;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .skin-option:hover {
            transform: scale(1.1);
            border-color: #ff9900;
        }
        
        .skin-option.active {
            border-color: #00ff41;
            box-shadow: 0 0 8px #00ff41;
        }
        
        .skin-option.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .skin-option.locked::after {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
        }
        
        .skin-option canvas {
            width: 100%;
            height: 100%;
        }
        
        /* ==================== BOSS HEALTH BAR ==================== */
        .boss-health-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .boss-name {
            color: #ff4040;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 5px #ff4040;
            min-width: 60px;
        }
        
        .boss-health-bar {
            flex: 1;
            height: 16px;
            background: #1a1a2e;
            border: 2px solid #ff4040;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .boss-health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4040, #ff6666);
            width: 100%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #ff4040 inset;
        }
        
        /* ==================== UNLOCK NOTIFICATION ==================== */
        .unlock-notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ff9900);
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: unlockPop 0.5s ease-out;
            z-index: 20;
            box-shadow: 0 0 30px #ffd700;
        }
        
        .unlock-icon {
            font-size: 28px;
            animation: bounce 0.5s ease infinite;
        }
        
        .unlock-text {
            color: #1a1a2e;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        @keyframes unlockPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        
        /* ==================== POWERUP BAR UPDATES ==================== */
        #powerUpBar {
            display: flex;
            gap: 6px;
        }
        
        .powerup-indicator {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            display: none;
        }
        
        .powerup-indicator.active {
            display: inline-block;
            animation: powerupPulse 1s infinite;
        }
        
        .powerup-indicator.ghost { background: #00ff4144; color: #00ff41; }
        .powerup-indicator.speed { background: #ffcc0044; color: #ffcc00; }
        .powerup-indicator.slow { background: #00bfff44; color: #00bfff; }
        .powerup-indicator.multiplier { background: #ff00ff44; color: #ff00ff; }
        .powerup-indicator.magnet { background: #ff990044; color: #ff9900; }

            this.enabled = true;
            this.initialized = false;
        }

        /**
         * Lazy initialization on first user interaction.
         * Required by browsers' autoplay policies.
         */
        init() {
            if (this.initialized) return;
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.initialized = true;
            } catch (e) {
                console.warn('Web Audio API not supported');
                this.enabled = false;
            }
        }

        /**
         * Generate a simple square wave beep - classic 8-bit sound
         * @param {number} freq - Frequency in Hz
         * @param {number} duration - Duration in seconds
         * @param {number} volume - Volume 0-1
         */
        beep(freq, duration, volume = 0.1) {
            if (!this.enabled || !this.ctx) return;
            
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            
            osc.type = 'square';  // Classic 8-bit waveform
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(volume, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            osc.start(this.ctx.currentTime);
            osc.stop(this.ctx.currentTime + duration);
        }

        // Sound effect presets - tuned to not be annoying
        playEat() {
            this.beep(880, 0.05, 0.08);
            setTimeout(() => this.beep(1320, 0.05, 0.06), 50);
        }

        playDeath() {
            this.beep(200, 0.15, 0.1);
            setTimeout(() => this.beep(150, 0.15, 0.08), 100);
            setTimeout(() => this.beep(100, 0.2, 0.06), 200);
        }

        playStart() {
            this.beep(440, 0.1, 0.06);
            setTimeout(() => this.beep(660, 0.1, 0.06), 100);
            setTimeout(() => this.beep(880, 0.15, 0.08), 200);
        }

        playPause() {
            this.beep(440, 0.08, 0.05);
        }
        
        playCombo(level) {
            // Higher pitch for higher combos
            const baseFreq = 660 + (level * 110);
            this.beep(baseFreq, 0.08, 0.06);
            setTimeout(() => this.beep(baseFreq * 1.5, 0.1, 0.08), 60);
        }
        
        playCountdown() {
            this.beep(440, 0.1, 0.05);
        }
        
        playGo() {
            this.beep(880, 0.15, 0.08);
        }
        
        playPowerUp() {
            // Rising arpeggio for power-up collection
            this.beep(523, 0.08, 0.06);   // C5
            setTimeout(() => this.beep(659, 0.08, 0.06), 50);   // E5
            setTimeout(() => this.beep(784, 0.08, 0.07), 100);  // G5
            setTimeout(() => this.beep(1047, 0.12, 0.08), 150); // C6
        }
        
        playPortal() {
            // Whoosh sound for portal teleport
            this.beep(800, 0.1, 0.05);
            setTimeout(() => this.beep(400, 0.15, 0.07), 50);
        }
        
        playLevelUp() {
            // Triumphant fanfare for level completion
            this.beep(523, 0.1, 0.07);   // C5
            setTimeout(() => this.beep(659, 0.1, 0.07), 100);  // E5
            setTimeout(() => this.beep(784, 0.1, 0.08), 200);  // G5
            setTimeout(() => this.beep(1047, 0.2, 0.1), 300);  // C6
        }
        
        toggle() {
            this.enabled = !this.enabled;
            return this.enabled;
        }
    }
    
    // ==========================================================================
    // PARTICLE SYSTEM - Visual feedback for food collection
    // ==========================================================================
    class ParticleSystem {
        constructor() {
            this.particles = [];
        }
        
        /**
         * Spawn particles at a position with given color
         * @param {number} x - X position (pixels)
         * @param {number} y - Y position (pixels)
         * @param {string} color - Particle color
         * @param {number} count - Number of particles
         */
        emit(x, y, color = '#ff0040', count = 8) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const speed = 2 + Math.random() * 3;
                
                this.particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0,  // 1.0 to 0.0
                    decay: 0.02 + Math.random() * 0.02,
                    size: 3 + Math.random() * 3,
                    color
                });
            }
        }
        
        /**
         * Emit combo particles (more dramatic)
         */
        emitCombo(x, y, comboLevel) {
            const colors = ['#ffcc00', '#ff6600', '#ff0040', '#00ff41'];
            const color = colors[Math.min(comboLevel - 1, colors.length - 1)];
            this.emit(x, y, color, 12 + comboLevel * 4);
        }
        
        /**
         * Update all particles
         * @param {number} deltaTime - Time since last frame
         */
        update(deltaTime) {
            for (let i = this.particles.length - 1; i >= 0; i--) {
                const p = this.particles[i];
                
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;  // Gravity
                p.life -= p.decay;
                
                if (p.life <= 0) {
                    this.particles.splice(i, 1);
                }
            }
        }
        
        /**
         * Render all particles
         * @param {CanvasRenderingContext2D} ctx - Canvas context
         */
        render(ctx) {
            this.particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(
                    p.x - p.size / 2,
                    p.y - p.size / 2,
                    p.size * p.life,
                    p.size * p.life
                );
            });
            ctx.globalAlpha = 1;
        }
        
        clear() {
            this.particles = [];
        }
    }
    
    // ==========================================================================
    // POWER-UP MANAGER - Spawns and manages power-up items
    // ==========================================================================
    class PowerUpManager {
        constructor() {
            this.activePowerUp = null;      // Power-up on the field
            this.activeEffects = {};         // Currently active effects
            this.spawnChance = 0.15;         // 15% chance per food eaten
            this.lastSpawnScore = 0;
        }
        
        reset() {
            this.activePowerUp = null;
            this.activeEffects = {};
            this.lastSpawnScore = 0;
        }
        
        /**
         * Maybe spawn a power-up after food is eaten
         */
        trySpawn(score, occupiedCells, gridSize) {
            // Don't spawn if one already exists or too soon
            if (this.activePowerUp) return;
            if (score - this.lastSpawnScore < 30) return;
            
            if (Math.random() < this.spawnChance) {
                const types = Object.values(PowerUpTypes);
                const type = types[Math.floor(Math.random() * types.length)];
                
                // Find empty cell
                let attempts = 0;
                let pos;
                do {
                    pos = {
                        x: Math.floor(Math.random() * gridSize),
                        y: Math.floor(Math.random() * gridSize)
                    };
                    attempts++;
                } while (occupiedCells.some(c => c.x === pos.x && c.y === pos.y) && attempts < 100);
                
                if (attempts < 100) {
                    this.activePowerUp = { ...type, ...pos };
                    this.lastSpawnScore = score;
                }
            }
        }
        
        /**
         * Check if snake head collects power-up
         */
        checkCollection(headX, headY) {
            if (!this.activePowerUp) return null;
            
            if (this.activePowerUp.x === headX && this.activePowerUp.y === headY) {
                const collected = this.activePowerUp;
                this.activePowerUp = null;
                this.activateEffect(collected);
                return collected;
            }
            return null;
        }
        
        activateEffect(powerUp) {
            this.activeEffects[powerUp.id] = {
                type: powerUp,
                endTime: performance.now() + powerUp.duration
            };
        }
        
        /**
         * Update active effects, remove expired ones
         */
        update() {
            const now = performance.now();
            for (const id in this.activeEffects) {
                if (this.activeEffects[id].endTime <= now) {
                    delete this.activeEffects[id];
                }
            }
        }
        
        hasEffect(effectId) {
            return !!this.activeEffects[effectId];
        }
        
        getEffectTimeRemaining(effectId) {
            if (!this.activeEffects[effectId]) return 0;
            return Math.max(0, this.activeEffects[effectId].endTime - performance.now());
        }
    }
    
    // ==========================================================================
    // LEVEL MANAGER - Handles level progression and obstacles
    // ==========================================================================
    class LevelManager {
        constructor() {
            this.currentLevel = 0;
            this.walls = [];
            this.portals = [];
            this.survivalWalls = [];  // For survival mode
            this.survivalWallTimer = 0;
        }
        
        reset() {
            this.currentLevel = 0;
            this.loadLevel(0);
            this.survivalWalls = [];
            this.survivalWallTimer = 0;
        }
        
        loadLevel(index) {
            const level = LevelDefinitions[Math.min(index, LevelDefinitions.length - 1)];
            this.currentLevel = index;
            this.walls = [...level.walls];
            this.portals = level.portals.map(p => ({
                entry: { ...p.entry },
                exit: { ...p.exit }
            }));
        }
        
        /**
         * Check if score qualifies for next level
         */
        checkLevelUp(score) {
            const nextLevel = this.currentLevel + 1;
            if (nextLevel < LevelDefinitions.length) {
                if (score >= LevelDefinitions[nextLevel].requiredScore) {
                    this.loadLevel(nextLevel);
                    return true;
                }
            }
            return false;
        }
        
        /**
         * Check if position hits a wall
         */
        isWall(x, y) {
            return this.walls.some(w => w.x === x && w.y === y) ||
                   this.survivalWalls.some(w => w.x === x && w.y === y);
        }
        
        /**
         * Check if position hits a portal entry, return exit if so
         */
        checkPortal(x, y) {
            for (const portal of this.portals) {
                if (portal.entry.x === x && portal.entry.y === y) {
                    return portal.exit;
                }
            }
            return null;
        }
        
        /**
         * Survival mode: close walls inward over time
         */
        updateSurvivalWalls(deltaTime, gridSize) {
            this.survivalWallTimer += deltaTime;
            
            const interval = GameModes.survival.wallCloseInterval;
            const layer = Math.floor(this.survivalWallTimer / interval);
            
            if (layer > 0 && this.survivalWalls.length < layer * (gridSize * 4 - 4)) {
                this.generateSurvivalWallLayer(layer - 1, gridSize);
                return true;  // New walls added
            }
            return false;
        }
        
        generateSurvivalWallLayer(layer, gridSize) {
            const offset = layer;
            
            // Top and bottom rows
            for (let x = offset; x < gridSize - offset; x++) {
                this.addSurvivalWall(x, offset, gridSize);
                this.addSurvivalWall(x, gridSize - 1 - offset, gridSize);
            }
            
            // Left and right columns (excluding corners)
            for (let y = offset + 1; y < gridSize - 1 - offset; y++) {
                this.addSurvivalWall(offset, y, gridSize);
                this.addSurvivalWall(gridSize - 1 - offset, y, gridSize);
            }
        }
        
        addSurvivalWall(x, y, gridSize) {
            // Don't add if already exists or would block too much
            if (!this.survivalWalls.some(w => w.x === x && w.y === y)) {
                // Leave some gaps for playability
                if (Math.random() > 0.1 || (x > 7 && x < 12 && y > 7 && y < 12)) {
                    this.survivalWalls.push({ x, y });
                }
            }
        }
        
        getAllObstacles() {
            return [...this.walls, ...this.survivalWalls];
        }
        
        getLevelName() {
            return LevelDefinitions[Math.min(this.currentLevel, LevelDefinitions.length - 1)].name;
        }
    }
    
    // ==========================================================================
    // SKIN MANAGER - Handles snake appearance customization
    // ==========================================================================
    class SkinManager {
        constructor() {
            this.currentSkin = 'default';
            this.unlockedSkins = ['default'];
            this.stats = {
                highScore: 0,
                gamesPlayed: 0,
                gamesWon: 0,
                maxCombo: 0,
                timedHighScore: 0,
                maxSurvivalTime: 0
            };
            this.loadProgress();
        }
        
        loadProgress() {
            try {
                const saved = localStorage.getItem('snakeSkinProgress');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.unlockedSkins = data.unlocked || ['default'];
                    this.currentSkin = data.current || 'default';
                    this.stats = { ...this.stats, ...data.stats };
                }
            } catch (e) {
                console.warn('Could not load skin progress');
            }
        }
        
        saveProgress() {
            try {
                localStorage.setItem('snakeSkinProgress', JSON.stringify({
                    unlocked: this.unlockedSkins,
                    current: this.currentSkin,
                    stats: this.stats
                }));
            } catch (e) {
                console.warn('Could not save skin progress');
            }
        }
        
        checkUnlocks(score, combo, mode, survivalTime, won) {
            const newUnlocks = [];
            this.stats.gamesPlayed++;
            if (score > this.stats.highScore) this.stats.highScore = score;
            if (combo > this.stats.maxCombo) this.stats.maxCombo = combo;
            if (won) this.stats.gamesWon++;
            if (mode === 'timed' && score > this.stats.timedHighScore) this.stats.timedHighScore = score;
            if (mode === 'survival' && survivalTime > this.stats.maxSurvivalTime) this.stats.maxSurvivalTime = survivalTime;
            
            // Check each skin's unlock condition
            for (const [id, skin] of Object.entries(SnakeSkins)) {
                if (this.unlockedSkins.includes(id)) continue;
                
                let unlocked = false;
                if (skin.unlockScore && this.stats.highScore >= skin.unlockScore) unlocked = true;
                if (skin.unlockWins && this.stats.gamesWon >= skin.unlockWins) unlocked = true;
                if (skin.unlockCombo && this.stats.maxCombo >= skin.unlockCombo) unlocked = true;
                if (skin.unlockGames && this.stats.gamesPlayed >= skin.unlockGames) unlocked = true;
                if (skin.unlockTimedScore && this.stats.timedHighScore >= skin.unlockTimedScore) unlocked = true;
                if (skin.unlockSurvivalTime && this.stats.maxSurvivalTime >= skin.unlockSurvivalTime) unlocked = true;
                
                if (unlocked) {
                    this.unlockedSkins.push(id);
                    newUnlocks.push(skin);
                }
            }
            
            this.saveProgress();
            return newUnlocks;
        }
        
        setSkin(skinId) {
            if (this.unlockedSkins.includes(skinId)) {
                this.currentSkin = skinId;
                this.saveProgress();
                return true;
            }
            return false;
        }
        
        getSkin() {
            return SnakeSkins[this.currentSkin] || SnakeSkins.default;
        }
        
        getUnlockedSkins() {
            return this.unlockedSkins.map(id => SnakeSkins[id]).filter(Boolean);
        }
        
        getAllSkins() {
            return Object.values(SnakeSkins).map(skin => ({
                ...skin,
                isUnlocked: this.unlockedSkins.includes(skin.id)
            }));
        }
        
        isUnlocked(skinId) {
            return this.unlockedSkins.includes(skinId);
        }
    }
    
    // ==========================================================================
    // REPLAY MANAGER - Records and plays back game sessions
    // ==========================================================================
    class ReplayManager {
        constructor() {
            this.isRecording = false;
            this.isPlaying = false;
            this.currentReplay = null;
            this.bestReplay = null;
            this.recordedInputs = [];
            this.recordStartTime = 0;
            this.playbackIndex = 0;
            this.playbackTime = 0;
            this.loadBestReplay();
        }
        
        loadBestReplay() {
            try {
                const saved = localStorage.getItem('snakeBestReplay');
                if (saved) {
                    this.bestReplay = JSON.parse(saved);
                }
            } catch (e) {
                console.warn('Could not load best replay');
            }
        }
        
        saveBestReplay() {
            try {
                if (this.bestReplay) {
                    localStorage.setItem('snakeBestReplay', JSON.stringify(this.bestReplay));
                }
            } catch (e) {
                console.warn('Could not save best replay');
            }
        }
        
        startRecording(initialState) {
            this.isRecording = true;
            this.recordedInputs = [];
            this.recordStartTime = performance.now();
            
            // Handle case where no state is provided
            if (!initialState) {
                this.currentReplay = {
                    startState: null,
                    inputs: [],
                    finalScore: 0,
                    timestamp: Date.now()
                };
                return;
            }
            
            this.currentReplay = {
                startState: {
                    snake: JSON.parse(JSON.stringify(initialState.snake)),
                    direction: { ...initialState.direction },
                    food: initialState.food ? { ...initialState.food } : null,
                    difficulty: initialState.difficulty ? initialState.difficulty.name : 'easy'
                },
                inputs: [],
                finalScore: 0,
                timestamp: Date.now()
            };
        }
        
        recordInput(direction, timestamp = performance.now()) {
            if (!this.isRecording) return;
            const relativeTime = timestamp - this.recordStartTime;
            this.currentReplay.inputs.push({
                time: relativeTime,
                direction: direction
            });
        }
        
        stopRecording(finalScore) {
            if (!this.isRecording) return null;
            this.isRecording = false;
            this.currentReplay.finalScore = finalScore;
            this.currentReplay.duration = performance.now() - this.recordStartTime;
            
            // Check if this is a new best
            if (!this.bestReplay || finalScore > this.bestReplay.finalScore) {
                this.bestReplay = { ...this.currentReplay };
                this.saveBestReplay();
                return { isNewBest: true, replay: this.currentReplay };
            }
            
            return { isNewBest: false, replay: this.currentReplay };
        }
        
        startPlayback(replay = null) {
            const replayToUse = replay || this.bestReplay;
            if (!replayToUse) return false;
            
            this.isPlaying = true;
            this.playbackIndex = 0;
            this.playbackTime = 0;
            this.currentReplay = replayToUse;
            return replayToUse.startState;
        }
        
        getNextInput(deltaTime) {
            if (!this.isPlaying || !this.currentReplay) return null;
            
            this.playbackTime += deltaTime;
            
            // Check if there's an input at or before current time
            while (this.playbackIndex < this.currentReplay.inputs.length) {
                const input = this.currentReplay.inputs[this.playbackIndex];
                if (input.time <= this.playbackTime) {
                    this.playbackIndex++;
                    return input.direction;
                }
                break;
            }
            
            // Check if playback is complete
            if (this.playbackIndex >= this.currentReplay.inputs.length) {
                this.isPlaying = false;
            }
            
            return null;
        }
        
        stopPlayback() {
            this.isPlaying = false;
            this.playbackIndex = 0;
            this.playbackTime = 0;
        }
        
        hasBestReplay() {
            return this.bestReplay !== null;
        }
        
        getBestScore() {
            return this.bestReplay ? this.bestReplay.finalScore : 0;
        }
        
        exportReplay() {
            if (!this.currentReplay) return null;
            return btoa(JSON.stringify(this.currentReplay));
        }
        
        importReplay(code) {
            try {
                const replay = JSON.parse(atob(code));
                if (replay.inputs && replay.startState) {
                    return replay;
                }
            } catch (e) {
                console.warn('Invalid replay code');
            }
            return null;
        }
    }
    
    // ==========================================================================
    // BOSS MANAGER - AI enemy snake for boss battles
    // ==========================================================================
    class BossManager {
        constructor() {
            this.boss = null;
            this.bossDefinition = null;
            this.healthPoints = 0;
            this.isActive = false;
            this.moveTimer = 0;
            this.patternPhase = 0;
            this.targetFood = null;
        }
        
        reset() {
            this.boss = null;
            this.bossDefinition = null;
            this.healthPoints = 0;
            this.isActive = false;
            this.moveTimer = 0;
            this.patternPhase = 0;
        }
        
        spawnBoss(bossId, gridSize) {
            const def = BossDefinitions[bossId];
            if (!def) return false;
            
            this.bossDefinition = def;
            this.healthPoints = def.healthPoints;
            this.isActive = true;
            this.moveTimer = 0;
            this.patternPhase = 0;
            
            // Spawn boss on opposite side from player (bottom-left)
            const startX = 3;
            const startY = gridSize - 4;
            
            this.boss = {
                body: [],  // Use 'body' to match drawBossSnake
                direction: { x: 1, y: 0 },
                color: def.color,
                health: def.healthPoints,
                maxHealth: def.healthPoints,
                type: bossId
            };
            
            for (let i = 0; i < def.initialLength; i++) {
                this.boss.body.push({ x: startX - i, y: startY });
            }
            
            return true;
        }
        
        update(deltaTime, playerHead, foodPos, gridSize) {
            if (!this.isActive || !this.boss) return null;
            
            this.moveTimer += deltaTime;
            
            if (this.moveTimer < this.bossDefinition.speed) return null;
            this.moveTimer = 0;
            
            // Determine direction based on behavior
            const newDirection = this.calculateDirection(playerHead, foodPos, gridSize);
            if (newDirection) {
                this.boss.direction = newDirection;
            }
            
            // Move boss
            const head = this.boss.body[0];
            let newHead = {
                x: head.x + this.boss.direction.x,
                y: head.y + this.boss.direction.y
            };
            
            // Wrap around
            if (newHead.x < 0) newHead.x = gridSize - 1;
            if (newHead.x >= gridSize) newHead.x = 0;
            if (newHead.y < 0) newHead.y = gridSize - 1;
            if (newHead.y >= gridSize) newHead.y = 0;
            
            this.boss.body.unshift(newHead);
            this.boss.body.pop();
            
            return newHead;
        }
        
        calculateDirection(playerHead, foodPos, gridSize) {
            const head = this.boss.body[0];
            let targetX, targetY;
            
            switch (this.bossDefinition.behavior) {
                case 'chase':
                    // Chase the player
                    targetX = playerHead.x;
                    targetY = playerHead.y;
                    break;
                    
                case 'aggressive':
                    // Chase food if close, otherwise chase player
                    if (foodPos && Math.abs(head.x - foodPos.x) + Math.abs(head.y - foodPos.y) < 8) {
                        targetX = foodPos.x;
                        targetY = foodPos.y;
                    } else {
                        targetX = playerHead.x;
                        targetY = playerHead.y;
                    }
                    break;
                    
                case 'pattern':
                    // Move in patterns with occasional chasing
                    this.patternPhase++;
                    if (this.patternPhase % 40 < 20) {
                        // Circle pattern
                        const patterns = [
                            { x: 1, y: 0 }, { x: 0, y: 1 },
                            { x: -1, y: 0 }, { x: 0, y: -1 }
                        ];
                        const patternIdx = Math.floor(this.patternPhase / 5) % 4;
                        return patterns[patternIdx];
                    } else {
                        targetX = playerHead.x;
                        targetY = playerHead.y;
                    }
                    break;
                    
                default:
                    return null;
            }
            
            // Simple pathfinding - move toward target
            const dx = targetX - head.x;
            const dy = targetY - head.y;
            
            // Don't reverse direction
            const current = this.boss.direction;
            
            let possibleDirs = [];
            if (dx > 0 && current.x !== -1) possibleDirs.push({ x: 1, y: 0 });
            if (dx < 0 && current.x !== 1) possibleDirs.push({ x: -1, y: 0 });
            if (dy > 0 && current.y !== -1) possibleDirs.push({ x: 0, y: 1 });
            if (dy < 0 && current.y !== 1) possibleDirs.push({ x: 0, y: -1 });
            
            if (possibleDirs.length > 0) {
                // Pick the direction that gets us closer
                return possibleDirs[0];
            }
            
            return null;
        }
        
        checkCollision(playerSnake) {
            if (!this.isActive || !this.boss) return { playerHit: false, bossHit: false };
            
            const playerHead = playerSnake[0];
            const bossHead = this.boss.body[0];
            
            // Check if player hit boss body
            let playerHitBoss = false;
            for (let i = 1; i < this.boss.body.length; i++) {
                if (playerHead.x === this.boss.body[i].x && 
                    playerHead.y === this.boss.body[i].y) {
                    playerHitBoss = true;
                    break;
                }
            }
            
            // Check if boss hit player body
            let bossHitPlayer = false;
            for (let i = 1; i < playerSnake.length; i++) {
                if (bossHead.x === playerSnake[i].x && 
                    bossHead.y === playerSnake[i].y) {
                    bossHitPlayer = true;
                    break;
                }
            }
            
            // Head-on collision
            const headCollision = playerHead.x === bossHead.x && playerHead.y === bossHead.y;
            
            return { 
                playerHitBoss: playerHitBoss || headCollision, 
                bossHitPlayer: bossHitPlayer || headCollision,
                headCollision 
            };
        }
        
        // Alias methods for compatibility
        checkCollisionWithSnake(playerSnake) {
            const result = this.checkCollision(playerSnake);
            return result.bossHitPlayer;
        }
        
        checkPlayerAttack(playerHead) {
            if (!this.isActive || !this.boss || !this.boss.body) return false;
            // Check if player head hit any boss body segment (not head)
            for (let i = 1; i < this.boss.body.length; i++) {
                if (playerHead.x === this.boss.body[i].x && 
                    playerHead.y === this.boss.body[i].y) {
                    this.boss.health--;
                    return true;
                }
            }
            return false;
        }
        
        takeDamage() {
            this.healthPoints--;
            if (this.healthPoints <= 0) {
                this.isActive = false;
                return { defeated: true, reward: this.bossDefinition.rewardScore };
            }
            return { defeated: false, reward: 0 };
        }
        
        getBoss() {
            return this.boss;
        }
        
        getHealthPercent() {
            if (!this.bossDefinition) return 0;
            return this.healthPoints / this.bossDefinition.healthPoints;
        }
    }
    
    // ==========================================================================
    // MULTIPLAYER MANAGER - P2P connections via PeerJS
    // ==========================================================================
    class MultiplayerManager {
        constructor() {
            this.peer = null;
            this.connection = null;
            this.isHost = false;
            this.isConnected = false;
            this.gameCode = '';
            this.opponentSnake = null;
            this.opponentScore = 0;
            this.callbacks = {};
            this.lastSentState = null;
        }
        
        /**
         * Initialize PeerJS - requires external script
         */
        async init() {
            // Check if PeerJS is loaded
            if (typeof Peer === 'undefined') {
                // Dynamically load PeerJS
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
                    script.onload = () => resolve(true);
                    script.onerror = () => reject(new Error('Failed to load PeerJS'));
                    document.head.appendChild(script);
                });
            }
            return true;
        }
        
        /**
         * Create a new game and get a shareable code
         */
        async createGame() {
            await this.init();
            
            return new Promise((resolve, reject) => {
                // Generate a simple game code
                this.gameCode = this.generateGameCode();
                
                this.peer = new Peer(this.gameCode);
                this.isHost = true;
                
                this.peer.on('open', (id) => {
                    console.log('Game created with code:', id);
                    resolve(id);
                });
                
                this.peer.on('connection', (conn) => {
                    this.connection = conn;
                    this.setupConnection();
                });
                
                this.peer.on('error', (err) => {
                    // Don't spam console with network errors
                    reject(err);
                });
            });
        }
        
        /**
         * Join an existing game with a code
         */
        async joinGame(code) {
            await this.init();
            
            return new Promise((resolve, reject) => {
                this.gameCode = code;
                this.peer = new Peer();
                this.isHost = false;
                
                this.peer.on('open', () => {
                    this.connection = this.peer.connect(code);
                    this.setupConnection();
                    
                    this.connection.on('open', () => {
                        resolve(true);
                    });
                });
                
                this.peer.on('error', (err) => {
                    // Don't spam console with network errors
                    reject(err);
                });
                
                // Timeout
                setTimeout(() => {
                    if (!this.isConnected) {
                        reject(new Error('Connection timeout'));
                    }
                }, 10000);
            });
        }
        
        setupConnection() {
            if (!this.connection) return;
            
            // Handler for when connection opens
            const handleOpen = () => {
                if (!this.isConnected) {
                    this.isConnected = true;
                    this.callbacks.onConnect?.();
                }
            };
            
            // Check if connection is already open (for host receiving connections)
            if (this.connection.open) {
                handleOpen();
            }
            
            // Also listen for open event (for joiner)
            this.connection.on('open', handleOpen);
            
            this.connection.on('data', (data) => {
                this.handleMessage(data);
            });
            
            this.connection.on('close', () => {
                this.isConnected = false;
                this.callbacks.onDisconnect?.();
            });
        }
        
        handleMessage(data) {
            switch (data.type) {
                case 'state':
                    this.opponentSnake = data.snake;
                    this.opponentScore = data.score;
                    this.callbacks.onOpponentUpdate?.(data);
                    break;
                case 'food':
                    this.callbacks.onFoodSync?.(data.food);
                    break;
                case 'gameOver':
                    this.callbacks.onOpponentGameOver?.(data.score);
                    break;
                case 'start':
                    this.callbacks.onGameStart?.(data);
                    break;
            }
        }
        
        sendState(snake, score, direction) {
            if (!this.isConnected || !this.connection) return;
            this.connection.send({
                type: 'state',
                snake: snake,
                score: score,
                direction: direction
            });
        }
        
        sendFood(food) {
            if (!this.isConnected || !this.connection) return;
            this.connection.send({
                type: 'food',
                food: food
            });
        }
        
        sendGameOver(score) {
            if (!this.isConnected || !this.connection) return;
            this.connection.send({
                type: 'gameOver',
                score: score
            });
        }
        
        startGame(seed) {
            if (!this.isConnected || !this.connection) return;
            this.connection.send({
                type: 'start',
                seed: seed
            });
        }
        
        generateGameCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = 'SNAKE-';
            for (let i = 0; i < 4; i++) {
                code += chars[Math.floor(Math.random() * chars.length)];
            }
            return code;
        }
        
        on(event, callback) {
            this.callbacks[event] = callback;
        }
        
        disconnect() {
            if (this.connection) {
                this.connection.close();
            }
            if (this.peer) {
                this.peer.destroy();
            }
            this.isConnected = false;
            this.connection = null;
            this.peer = null;
        }
        
        getGameCode() {
            return this.gameCode;
        }
        
        getOpponentSnake() {
            return this.opponentSnake;
        }
        
        getOpponentScore() {
            return this.opponentScore;
        }
    }

    // ==========================================================================
    // INPUT MANAGER - Handles keyboard, touch, and swipe with input buffering
    // ==========================================================================
    class InputManager {
        constructor() {
            this.inputBuffer = [];
            this.maxBufferSize = GameConfig.INPUT_BUFFER_SIZE;
            
            // Direction vectors for each input
            this.directionMap = {
                'up':    { x: 0, y: -1 },
                'down':  { x: 0, y: 1 },
                'left':  { x: -1, y: 0 },
                'right': { x: 1, y: 0 }
            };
            
            // Track bound handlers for cleanup
            this.keyHandler = null;
            this.touchHandler = null;
            
            // Swipe detection
            this.touchStartX = 0;
            this.touchStartY = 0;
            this.swipeThreshold = 30;  // Minimum pixels for swipe detection
            this.swipeHandlers = {};
        }

        /**
         * Initialize input listeners
         * @param {Function} onPause - Callback for pause toggle
         * @param {Function} onRestart - Callback for restart
         * @param {HTMLElement} swipeTarget - Element to attach swipe listeners to
         */
        init(onPause, onRestart, swipeTarget = null) {
            this.onPause = onPause;
            this.onRestart = onRestart;
            
            // Keyboard input
            this.keyHandler = (e) => this.handleKeyDown(e);
            window.addEventListener('keydown', this.keyHandler);
            
            // Touch controls
            const touchBtns = document.querySelectorAll('.touch-btn[data-dir]');
            this.touchHandler = (e) => {
                const dir = e.currentTarget.dataset.dir;
                if (dir) this.queueDirection(dir);
            };
            touchBtns.forEach(btn => {
                btn.addEventListener('touchstart', this.touchHandler);
                btn.addEventListener('click', this.touchHandler);
            });
            
            // Swipe gesture detection on canvas
            if (swipeTarget) {
                this.initSwipeGestures(swipeTarget);
            }
        }
        
        /**
         * Initialize swipe gesture detection for touch screens
         */
        initSwipeGestures(target) {
            this.swipeHandlers.touchstart = (e) => {
                const touch = e.touches[0];
                this.touchStartX = touch.clientX;
                this.touchStartY = touch.clientY;
            };
            
            this.swipeHandlers.touchmove = (e) => {
                // Prevent scrolling while swiping on canvas
                e.preventDefault();
            };
            
            this.swipeHandlers.touchend = (e) => {
                if (!e.changedTouches[0]) return;
                
                const touch = e.changedTouches[0];
                const deltaX = touch.clientX - this.touchStartX;
                const deltaY = touch.clientY - this.touchStartY;
                const absX = Math.abs(deltaX);
                const absY = Math.abs(deltaY);
                
                // Check if swipe was long enough
                if (Math.max(absX, absY) < this.swipeThreshold) {
                    // Tap - could be pause
                    if (absX < 10 && absY < 10) {
                        this.onPause?.();
                    }
                    return;
                }
                
                // Determine swipe direction (use the dominant axis)
                if (absX > absY) {
                    // Horizontal swipe
                    this.queueDirection(deltaX > 0 ? 'right' : 'left');
                } else {
                    // Vertical swipe
                    this.queueDirection(deltaY > 0 ? 'down' : 'up');
                }
            };
            
            target.addEventListener('touchstart', this.swipeHandlers.touchstart, { passive: true });
            target.addEventListener('touchmove', this.swipeHandlers.touchmove, { passive: false });
            target.addEventListener('touchend', this.swipeHandlers.touchend, { passive: true });
        }

        handleKeyDown(e) {
            // Map keys to directions
            const keyMap = {
                'ArrowUp': 'up', 'KeyW': 'up',
                'ArrowDown': 'down', 'KeyS': 'down',
                'ArrowLeft': 'left', 'KeyA': 'left',
                'ArrowRight': 'right', 'KeyD': 'right'
            };
            
            const direction = keyMap[e.code];
            if (direction) {
                e.preventDefault();  // Prevent page scrolling
                this.queueDirection(direction);
                return;
            }
            
            // Meta keys
            if (e.code === 'Space') {
                e.preventDefault();
                this.onPause?.();
            } else if (e.code === 'Enter') {
                e.preventDefault();
                this.onRestart?.();
            }
        }

        /**
         * Queue a direction change with buffer limit.
         * 
         * WHY INPUT BUFFERING?
         * When player rapidly presses UP then RIGHT to make a quick turn,
         * without buffering the RIGHT press could be lost if it happens
         * before the next game tick processes UP. This creates frustrating
         * "dropped input" feeling. Buffer stores last N inputs for processing.
         */
        queueDirection(direction) {
            if (this.inputBuffer.length < this.maxBufferSize) {
                this.inputBuffer.push(direction);
            }
        }

        /**
         * Get next buffered direction, if any
         * @returns {Object|null} Direction vector or null
         */
        consumeInput() {
            if (this.inputBuffer.length === 0) return null;
            const dir = this.inputBuffer.shift();
            return this.directionMap[dir];
        }

        /**
         * Clear all buffered inputs (on game restart)
         */
        clearBuffer() {
            this.inputBuffer = [];
        }

        destroy() {
            if (this.keyHandler) {
                window.removeEventListener('keydown', this.keyHandler);
            }
        }
    }

    // ==========================================================================
    // GAME STATE - Pure game logic, no rendering knowledge
    // ==========================================================================
    class GameState {
        constructor() {
            this.difficulty = DifficultyLevels[currentDifficulty];
            this.reset();
        }

        /**
         * Set difficulty level
         * @param {string} level - 'easy', 'medium', 'hard', 'insane'
         */
        setDifficulty(level) {
            if (DifficultyLevels[level]) {
                this.difficulty = DifficultyLevels[level];
                currentDifficulty = level;
            }
        }

        reset() {
            const gridSize = GameConfig.GRID_SIZE;
            const startX = Math.floor(gridSize / 2);
            const startY = Math.floor(gridSize / 2);
            
            // Refresh difficulty settings
            this.difficulty = DifficultyLevels[currentDifficulty];
            
            // Initialize snake at center, facing right
            this.snake = [];
            for (let i = 0; i < GameConfig.INITIAL_LENGTH; i++) {
                this.snake.push({ x: startX - i, y: startY });
            }
            
            this.direction = { x: 1, y: 0 };  // Moving right
            this.nextDirection = { x: 1, y: 0 };
            this.food = null;
            this.score = 0;
            // Use difficulty-based speed
            this.moveInterval = this.difficulty.initialSpeed;
            this.gameOver = false;
            this.foodEatenThisTick = false;
            
            // Combo system: rewards quick consecutive food collection
            this.combo = 0;
            this.comboTimer = 0;
            this.comboTimeout = 5000;  // 5 seconds to maintain combo
            this.lastFoodTime = 0;
            
            this.spawnFood();
        }
        
        /**
         * Update combo timer (called every frame)
         * @param {number} deltaTime - Time since last frame in ms
         */
        updateCombo(deltaTime) {
            if (this.combo > 0) {
                this.comboTimer += deltaTime;
                if (this.comboTimer >= this.comboTimeout) {
                    this.combo = 0;
                    this.comboTimer = 0;
                }
            }
        }
        
        /**
         * Get current speed level (1-10) for display
         */
        getSpeedLevel() {
            const diff = this.difficulty;
            const range = diff.initialSpeed - diff.minSpeed;
            const current = diff.initialSpeed - this.moveInterval;
            return Math.min(10, Math.floor((current / range) * 9) + 1);
        }

        /**
         * Spawn food at random empty cell.
         * Uses rejection sampling - simple and fast for sparse grids.
         * @param {LevelManager} levelManager - Optional, to avoid walls
         */
        spawnFood(levelManager = null) {
            const gridSize = GameConfig.GRID_SIZE;
            let attempts = 0;
            const maxAttempts = gridSize * gridSize;
            
            do {
                this.food = {
                    x: Math.floor(Math.random() * gridSize),
                    y: Math.floor(Math.random() * gridSize)
                };
                attempts++;
                
                // Edge case: grid nearly full, find any empty cell
                if (attempts > maxAttempts) {
                    this.food = this.findEmptyCell(levelManager);
                    break;
                }
            } while (this.isCellOccupied(this.food.x, this.food.y) || 
                     (levelManager && levelManager.isWall(this.food.x, this.food.y)));
        }

        /**
         * Fallback for nearly-full grid: scan for empty cell
         * O(n) but only used in edge case
         */
        findEmptyCell(levelManager = null) {
            const gridSize = GameConfig.GRID_SIZE;
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    if (!this.isCellOccupied(x, y) && 
                        (!levelManager || !levelManager.isWall(x, y))) {
                        return { x, y };
                    }
                }
            }
            return null;  // Grid completely full - player wins!
        }

        isCellOccupied(x, y) {
            return this.snake.some(seg => seg.x === x && seg.y === y);
        }

        /**
         * Apply a direction change if valid (not 180-degree turn)
         * @param {Object} newDir - New direction vector
         * @returns {boolean} Whether direction was applied
         */
        setDirection(newDir) {
            if (!newDir) return false;
            
            // Prevent 180-degree turns (instant death)
            const isOpposite = (
                newDir.x === -this.direction.x && 
                newDir.y === -this.direction.y
            );
            
            if (!isOpposite) {
                this.nextDirection = newDir;
                return true;
            }
            return false;
        }

        /**
         * Main game tick - move snake, check collisions
         * @param {LevelManager} levelManager - For wall/portal checks
         * @param {PowerUpManager} powerUpManager - For power-up effects
         * @returns {string} Event that occurred: 'move', 'eat', 'death', 'win', 'portal', 'levelup'
         * 
         * WALL WRAPPING LOGIC:
         * Instead of dying on wall collision, snake wraps to opposite side.
         * This creates a toroidal (donut-shaped) play field like classic
         * arcade games. Only self-collision causes death.
         */
        update(levelManager = null, powerUpManager = null) {
            if (this.gameOver) return 'none';
            
            this.foodEatenThisTick = false;
            this.direction = this.nextDirection;
            
            // Calculate new head position
            const head = this.snake[0];
            let newHead = {
                x: head.x + this.direction.x,
                y: head.y + this.direction.y
            };
            
            // WALL WRAPPING: Snake teleports to opposite wall
            const gridSize = GameConfig.GRID_SIZE;
            if (newHead.x < 0) {
                newHead.x = gridSize - 1;  // Left wall -> Right side
            } else if (newHead.x >= gridSize) {
                newHead.x = 0;              // Right wall -> Left side
            }
            if (newHead.y < 0) {
                newHead.y = gridSize - 1;  // Top wall -> Bottom side
            } else if (newHead.y >= gridSize) {
                newHead.y = 0;              // Bottom wall -> Top side
            }
            
            // Check portal teleportation
            let usedPortal = false;
            if (levelManager) {
                const portalExit = levelManager.checkPortal(newHead.x, newHead.y);
                if (portalExit) {
                    newHead = { x: portalExit.x, y: portalExit.y };
                    usedPortal = true;
                }
            }
            
            // Check wall collision (unless ghost mode active)
            const isGhost = powerUpManager && powerUpManager.hasEffect('ghost');
            if (levelManager && !isGhost && levelManager.isWall(newHead.x, newHead.y)) {
                this.gameOver = true;
                return 'death';
            }
            
            // Self collision check - ONLY way to die (besides walls)!
            // Ghost mode allows passing through own body
            if (!isGhost) {
                for (let i = 0; i < this.snake.length - 1; i++) {
                    if (this.snake[i].x === newHead.x && 
                        this.snake[i].y === newHead.y) {
                        this.gameOver = true;
                        return 'death';
                    }
                }
            }
            
            // Add new head
            this.snake.unshift(newHead);
            
            // Food collision check
            if (this.food && newHead.x === this.food.x && newHead.y === this.food.y) {
                this.foodEatenThisTick = true;
                
                // Combo system - eating food quickly builds combo
                const now = performance.now();
                if (this.lastFoodTime > 0 && (now - this.lastFoodTime) < this.comboTimeout) {
                    this.combo = Math.min(this.combo + 1, 10);  // Max combo x10
                } else {
                    this.combo = 1;
                }
                this.comboTimer = 0;
                this.lastFoodTime = now;
                
                // Score with combo multiplier
                const baseScore = 10;
                const comboBonus = this.combo > 1 ? (this.combo - 1) * 5 : 0;
                
                // Apply score multiplier from power-up
                const multiplier = (powerUpManager && powerUpManager.hasEffect('multiplier')) ? 2 : 1;
                this.score += (baseScore + comboBonus) * multiplier;
                
                // Increase speed based on difficulty settings
                this.moveInterval = Math.max(
                    this.difficulty.minSpeed,
                    this.moveInterval - this.difficulty.speedIncrement
                );
                
                // Check win condition (filled entire grid)
