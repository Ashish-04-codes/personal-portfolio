                if (this.snake.length >= gridSize * gridSize) {
                    this.food = null;
                    return 'win';
                }
                
                // Check level up in levels mode
                if (levelManager && levelManager.checkLevelUp(this.score)) {
                    this.spawnFood(levelManager);
                    return 'levelup';
                }
                
                this.spawnFood(levelManager);
                return usedPortal ? 'portal' : 'eat';
            } else {
                // Remove tail (snake moves without growing)
                this.snake.pop();
            }
            
            return usedPortal ? 'portal' : 'move';
        }
        
        /**
         * Get current speed modified by power-ups
         */
        getMoveInterval(powerUpManager = null) {
            let interval = this.moveInterval;
            if (powerUpManager) {
                if (powerUpManager.hasEffect('speed')) {
                    interval *= 0.6;  // 40% faster
                }
                if (powerUpManager.hasEffect('slow')) {
                    interval *= 1.5;  // 50% slower
                }
            }
            return interval;
        }
    }

    // ==========================================================================
    // RENDERER - Canvas drawing and visual effects
    // ==========================================================================
    class Renderer {
        constructor(canvas) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d', { alpha: false });
            
            // Pixel-perfect rendering
            this.ctx.imageSmoothingEnabled = false;
            
            this.cellSize = GameConfig.CELL_SIZE;
            this.gridSize = GameConfig.GRID_SIZE;
            this.colors = { ...GameConfig.COLORS };  // Copy default colors
            
            // Animation state
            this.foodPulse = 0;
            this.deathFlash = 0;
            this.portalPulse = 0;
            this.powerUpPulse = 0;
        }
        
        /**
         * Apply a theme's color palette
         */
        setTheme(themeId) {
            if (!Themes[themeId]) return;
            
            const theme = Themes[themeId];
            // Map theme properties to renderer color format
            this.colors = {
                BACKGROUND: theme.background,
                GRID: theme.grid,
                SNAKE_HEAD: theme.snakeHead,
                SNAKE_BODY: theme.snakeBody,
                SNAKE_TAIL: theme.snakeTail,
                FOOD: theme.food,
                FOOD_GLOW: theme.foodGlow,
                WALL: theme.wall,
                WALL_ACCENT: theme.wall + 'aa',  // Slightly transparent version
                TEXT: theme.text,
                TEXT_DIM: theme.textDim,
                ACCENT: theme.powerup
            };
        }

        /**
         * Clear and draw grid background
         */
        drawBackground() {
            const { ctx, canvas, colors, cellSize, gridSize } = this;
            
            // Fill background
            ctx.fillStyle = colors.BACKGROUND;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw subtle grid lines
            ctx.strokeStyle = colors.GRID;
            ctx.lineWidth = 1;
            
            for (let i = 0; i <= gridSize; i++) {
                const pos = i * cellSize;
                
                // Vertical line
                ctx.beginPath();
                ctx.moveTo(pos + 0.5, 0);
                ctx.lineTo(pos + 0.5, canvas.height);
                ctx.stroke();
                
                // Horizontal line
                ctx.beginPath();
                ctx.moveTo(0, pos + 0.5);
                ctx.lineTo(canvas.width, pos + 0.5);
                ctx.stroke();
            }
        }

        /**
         * Draw snake with gradient body and distinct head
         */
        drawSnake(snake, skinId = 'default') {
            const { ctx, cellSize, colors } = this;
            const padding = 1;  // Gap between cells for clarity
            const skin = SnakeSkins[skinId] || SnakeSkins.default;
            
            // Get skin colors - handle both object {head,body,tail} and null (rainbow)
            const skinColors = skin.colors ? 
                (typeof skin.colors === 'object' ? skin.colors : null) : null;
            
            snake.forEach((segment, index) => {
                const x = segment.x * cellSize + padding;
                const y = segment.y * cellSize + padding;
                const size = cellSize - padding * 2;
                
                // Get color based on skin pattern
                let fillColor;
                const t = index / snake.length; // 0 = head, 1 = tail
                
                if (skin.pattern === 'rainbow' || !skinColors) {
                    // Dynamic rainbow colors
                    const hue = (index * 20 + performance.now() / 20) % 360;
                    fillColor = `hsl(${hue}, 100%, 50%)`;
                } else if (skin.pattern === 'gradient' || skin.pattern === 'solid') {
                    // Use head/body/tail colors based on position
                    if (index === 0) {
                        fillColor = skinColors.head;
                    } else if (t < 0.7) {
                        fillColor = skinColors.body;
                    } else {
                        fillColor = skinColors.tail;
                    }
                } else if (skin.pattern === 'pulse') {
                    const pulse = Math.sin(performance.now() / 200 + index * 0.5) * 0.3 + 0.7;
                    fillColor = skinColors.body;
                    ctx.globalAlpha = pulse;
                } else if (skin.pattern === 'checker') {
                    fillColor = index % 2 === 0 ? skinColors.head : skinColors.body;
                } else if (skin.pattern === 'scales') {
                    fillColor = index % 3 === 0 ? skinColors.head : skinColors.body;
                } else if (skin.pattern === 'fade') {
                    fillColor = skinColors.body;
                    ctx.globalAlpha = 1 - t * 0.6;
                } else {
                    // Default fallback
                    fillColor = index === 0 ? skinColors.head : skinColors.body;
                }
                
                // Head is brightest, body fades toward tail
                if (index === 0) {
                    ctx.fillStyle = fillColor || colors.SNAKE_HEAD;
                    
                    // Draw head
                    ctx.fillRect(x, y, size, size);
                    
                    // Simple eyes based on direction
                    ctx.fillStyle = colors.BACKGROUND;
                    const eyeSize = 3;
                    const eyeOffset = 4;
                    ctx.fillRect(x + eyeOffset, y + eyeOffset, eyeSize, eyeSize);
                    ctx.fillRect(x + size - eyeOffset - eyeSize, y + eyeOffset, eyeSize, eyeSize);
                    
                } else {
                    ctx.fillStyle = fillColor || colors.SNAKE_BODY;
                    ctx.fillRect(x, y, size, size);
                    
                    // Trail effect for certain skins
                    if (skin.trailEffect === 'sparkle' && Math.random() < 0.1) {
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.fillRect(x + size/4, y + size/4, size/2, size/2);
                    }
                }
            });
            ctx.globalAlpha = 1;
        }
        
        /**
         * Draw boss snake (enemy AI)
         */
        drawBossSnake(boss) {
            if (!boss || !boss.body || boss.body.length === 0) return;
            
            const { ctx, cellSize } = this;
            const padding = 1;
            
            boss.body.forEach((segment, index) => {
                const x = segment.x * cellSize + padding;
                const y = segment.y * cellSize + padding;
                const size = cellSize - padding * 2;
                
                // Boss colors - red/orange gradient
                const t = index / boss.body.length;
                const r = Math.floor(255 - t * 100);
                const g = Math.floor(50 + t * 50);
                
                if (index === 0) {
                    // Boss head
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(x, y, size, size);
                    
                    // Angry eyes
                    ctx.fillStyle = '#ffff00';
                    const eyeSize = 4;
                    ctx.fillRect(x + 3, y + 3, eyeSize, eyeSize);
                    ctx.fillRect(x + size - 7, y + 3, eyeSize, eyeSize);
                    
                    // Evil pupils
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x + 4, y + 4, 2, 2);
                    ctx.fillRect(x + size - 6, y + 4, 2, 2);
                } else {
                    ctx.fillStyle = `rgb(${r},${g},0)`;
                    ctx.fillRect(x, y, size, size);
                }
            });
        }
        
        /**
         * Draw ghost replay snake (transparent)
         */
        drawGhostSnake(snake) {
            if (!snake || snake.length === 0) return;
            
            const { ctx, cellSize } = this;
            const padding = 1;
            
            ctx.globalAlpha = 0.3;
            
            snake.forEach((segment, index) => {
                const x = segment.x * cellSize + padding;
                const y = segment.y * cellSize + padding;
                const size = cellSize - padding * 2;
                
                ctx.fillStyle = index === 0 ? '#9966ff' : '#6644aa';
                ctx.fillRect(x, y, size, size);
            });
            
            ctx.globalAlpha = 1;
        }

        /**
         * Draw food with pulsing glow effect
         */
        drawFood(food, deltaTime) {
            if (!food) return;
            
            const { ctx, cellSize, colors } = this;
            
            // Update pulse animation
            this.foodPulse += GameConfig.FOOD_PULSE_SPEED * deltaTime;
            const pulse = Math.sin(this.foodPulse) * 0.3 + 0.7;
            
            const padding = 2;
            const x = food.x * cellSize + padding;
            const y = food.y * cellSize + padding;
            const size = cellSize - padding * 2;
            
            // Glow effect
            ctx.fillStyle = colors.FOOD_GLOW;
            const glowExpand = (1 - pulse) * 4;
            ctx.fillRect(
                x - glowExpand, 
                y - glowExpand, 
                size + glowExpand * 2, 
                size + glowExpand * 2
            );
            
            // Main food
            ctx.fillStyle = colors.FOOD;
            ctx.globalAlpha = 0.7 + pulse * 0.3;
            ctx.fillRect(x, y, size, size);
            ctx.globalAlpha = 1;
        }
        
        /**
         * Draw walls/obstacles
         */
        drawWalls(walls) {
            if (!walls || walls.length === 0) return;
            
            const { ctx, cellSize, colors } = this;
            
            ctx.fillStyle = colors.WALL || '#666';
            
            walls.forEach(wall => {
                const x = wall.x * cellSize;
                const y = wall.y * cellSize;
                
                // Draw solid wall block with slight border
                ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
                
                // Add brick-like pattern
                ctx.strokeStyle = colors.WALL_ACCENT || '#555';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 2, y + 2, cellSize - 4, cellSize - 4);
            });
        }
        
        /**
         * Draw portal pairs with pulsing animation
         */
        drawPortals(portals, deltaTime) {
            if (!portals || portals.length === 0) return;
            
            const { ctx, cellSize, colors } = this;
            
            // Update portal animation
            this.portalPulse += deltaTime * 0.005;
            const pulse = (Math.sin(this.portalPulse) + 1) * 0.5;
            
            portals.forEach((portal, index) => {
                // Different color per portal pair
                const hue = (index * 60) % 360;
                const entryColor = `hsla(${hue}, 80%, 50%, ${0.6 + pulse * 0.4})`;
                const exitColor = `hsla(${hue + 180}, 80%, 50%, ${0.6 + pulse * 0.4})`;
                
                // Draw entry
                const ex = portal.entry.x * cellSize + cellSize / 2;
                const ey = portal.entry.y * cellSize + cellSize / 2;
                const radius = (cellSize / 2 - 2) * (0.8 + pulse * 0.2);
                
                ctx.beginPath();
                ctx.arc(ex, ey, radius, 0, Math.PI * 2);
                ctx.fillStyle = entryColor;
                ctx.fill();
                
                // Inner ring
                ctx.beginPath();
                ctx.arc(ex, ey, radius * 0.5, 0, Math.PI * 2);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw exit
                const px = portal.exit.x * cellSize + cellSize / 2;
                const py = portal.exit.y * cellSize + cellSize / 2;
                
                ctx.beginPath();
                ctx.arc(px, py, radius, 0, Math.PI * 2);
                ctx.fillStyle = exitColor;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(px, py, radius * 0.5, 0, Math.PI * 2);
                ctx.stroke();
            });
        }
        
        /**
         * Draw power-up item on field
         */
        drawPowerUp(powerUp, deltaTime) {
            if (!powerUp) return;
            
            const { ctx, cellSize } = this;
            
            // Update animation
            this.powerUpPulse += deltaTime * 0.008;
            const pulse = (Math.sin(this.powerUpPulse * 2) + 1) * 0.5;
            const bounce = Math.sin(this.powerUpPulse * 3) * 2;
            
            const x = powerUp.x * cellSize + cellSize / 2;
            const y = powerUp.y * cellSize + cellSize / 2 + bounce;
            const radius = (cellSize / 2 - 2) * (0.9 + pulse * 0.1);
            
            // Glow effect
            ctx.beginPath();
            ctx.arc(x, y, radius + 4, 0, Math.PI * 2);
            ctx.fillStyle = powerUp.color.replace(')', ', 0.3)').replace('rgb', 'rgba');
            ctx.fill();
            
            // Main orb
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = powerUp.color;
            ctx.fill();
            
            // Icon/symbol inside
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(powerUp.symbol || '?', x, y);
        }
        
        /**
         * Draw snake with ghost effect when power-up active
         */
        drawSnakeWithEffects(snake, isGhost = false) {
            const { ctx, cellSize, colors } = this;
            const padding = 1;
            
            if (isGhost) {
                ctx.globalAlpha = 0.5;
            }
            
            snake.forEach((segment, index) => {
                const x = segment.x * cellSize + padding;
                const y = segment.y * cellSize + padding;
                const size = cellSize - padding * 2;
                
                if (index === 0) {
                    ctx.fillStyle = isGhost ? 'rgba(150, 200, 255, 0.8)' : colors.SNAKE_HEAD;
                    ctx.fillRect(x, y, size, size);
                    
                    // Eyes
                    ctx.fillStyle = colors.BACKGROUND;
                    const eyeSize = 3;
                    const eyeOffset = 4;
                    ctx.fillRect(x + eyeOffset, y + eyeOffset, eyeSize, eyeSize);
                    ctx.fillRect(x + size - eyeOffset - eyeSize, y + eyeOffset, eyeSize, eyeSize);
                } else {
                    const t = index / snake.length;
                    ctx.fillStyle = t < 0.7 ? colors.SNAKE_BODY : colors.SNAKE_TAIL;
                    ctx.fillRect(x, y, size, size);
                }
            });
            
            ctx.globalAlpha = 1;
        }

        /**
         * Draw centered text overlay
         */
        drawTextOverlay(title, subtitle = '', color = this.colors.TEXT) {
            const { ctx, canvas, colors } = this;
            
            // Semi-transparent backdrop
            ctx.fillStyle = 'rgba(15, 15, 35, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Title
            ctx.fillStyle = color;
            ctx.font = 'bold 28px "Courier New", monospace';
            ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);
            
            // Subtitle
            if (subtitle) {
                ctx.fillStyle = colors.TEXT_DIM;
                ctx.font = '14px "Courier New", monospace';
                ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        /**
         * Draw boot/startup screen
         */
        drawBootScreen(progress) {
            const { ctx, canvas, colors } = this;
            
            ctx.fillStyle = colors.BACKGROUND;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Title
            ctx.fillStyle = colors.SNAKE_HEAD;
            ctx.font = 'bold 36px "Courier New", monospace';
            ctx.fillText('SNAKE', canvas.width / 2, canvas.height / 2 - 50);
            
            // Subtitle hint
            ctx.fillStyle = colors.ACCENT;
            ctx.font = '12px "Courier New", monospace';
            ctx.fillText('Walls wrap around! Only hit yourself to lose.', canvas.width / 2, canvas.height / 2 - 15);
            
            // Loading bar
            const barWidth = 200;
            const barHeight = 8;
            const barX = (canvas.width - barWidth) / 2;
            const barY = canvas.height / 2 + 30;
            
            ctx.fillStyle = colors.GRID;
            ctx.fillRect(barX, barY, barWidth, barHeight);
            
            ctx.fillStyle = colors.SNAKE_HEAD;
            ctx.fillRect(barX, barY, barWidth * progress, barHeight);
            
            // Version text
            ctx.fillStyle = colors.TEXT_DIM;
            ctx.font = '10px "Courier New", monospace';
            ctx.fillText('v3.0 - RETRO EDITION', canvas.width / 2, canvas.height - 30);
        }

        /**
         * Main render call
         */
        render(gameState, state, deltaTime, particles = null, isNewHighScore = false) {
            this.drawBackground();
            
            if (state === 'BOOT') {
                return;  // Boot screen handled separately
            }
            
            this.drawFood(gameState.food, deltaTime);
            this.drawSnake(gameState.snake);
            
            // Render particles on top
            if (particles) {
                particles.render(this.ctx);
            }
            
            if (state === 'PAUSED') {
                this.drawTextOverlay('PAUSED', 'Press SPACE to continue');
            } else if (state === 'GAME_OVER') {
                const diffName = gameState.difficulty.name;
                const title = isNewHighScore ? 'NEW HIGH SCORE!' : 'GAME OVER';
                const color = isNewHighScore ? this.colors.ACCENT : this.colors.FOOD;
                this.drawTextOverlay(
                    title,
                    `${diffName} | Score: ${gameState.score} | Press ENTER`,
                    color
                );
            }
        }
    }

    // ==========================================================================
    // GAME - Main controller with fixed-timestep game loop
    // ==========================================================================
    class Game {
        constructor() {
            this.canvas = document.getElementById('gameCanvas');
            this.scoreElement = document.getElementById('score');
            this.highScoreElement = document.getElementById('highScore');
            this.comboElement = document.getElementById('comboDisplay');
            this.speedElement = document.getElementById('speedLevel');
            this.canvasWrapper = document.getElementById('canvasWrapper');
            this.soundToggle = document.getElementById('soundToggle');
            this.countdownOverlay = document.getElementById('countdownOverlay');
            this.countdownNumber = document.getElementById('countdownNumber');
            this.timerDisplay = document.getElementById('timerDisplay');
            this.levelDisplay = document.getElementById('levelDisplay');
            this.powerUpBar = document.getElementById('powerUpBar');
            this.survivalWarning = document.getElementById('survivalWarning');
            this.accessibilityBtn = document.getElementById('accessibilityToggle');
            
            // New UI elements
            this.multiplayerPanel = document.getElementById('multiplayerPanel');
            this.bossHealthContainer = document.getElementById('bossHealthContainer');
            this.bossHealthFill = document.getElementById('bossHealthFill');
            this.bossNameEl = document.getElementById('bossName');
            this.skinSelector = document.getElementById('skinSelector');
            this.skinDropdown = document.getElementById('skinDropdown');
            this.unlockNotification = document.getElementById('unlockNotification');
            this.unlockText = document.getElementById('unlockText');
            
            this.renderer = new Renderer(this.canvas);
            this.audio = new AudioManager();
            this.input = new InputManager();
            this.gameState = new GameState();
            this.particles = new ParticleSystem();
            this.powerUpManager = new PowerUpManager();
            this.levelManager = new LevelManager();
            
            // New managers
            this.skinManager = new SkinManager();
            this.replayManager = new ReplayManager();
            this.bossManager = new BossManager();
            this.multiplayerManager = new MultiplayerManager();
            
            // Game mode and theme
            this.currentMode = 'classic';
            this.currentTheme = 'retro';
            this.timedModeTimer = 0;
            this.survivalWarningShown = false;
            
            // New mode states
            this.currentSkin = localStorage.getItem('snakeSelectedSkin') || 'default';
            this.ghostReplay = null;
            this.isGhostMode = false;
            
            // High score from localStorage
            this.highScore = this.loadHighScore();
            this.isNewHighScore = false;
            this.updateHighScoreDisplay();
            
            // Game states: BOOT, COUNTDOWN, PLAYING, PAUSED, GAME_OVER
            this.state = 'BOOT';
            this.bootStartTime = 0;
            this.countdownValue = 3;
            this.countdownTimer = 0;
            
            // Fixed-timestep loop variables
            this.lastTime = 0;
            this.accumulator = 0;
            this.animationId = null;
            
            this.init();
        }

        init() {
            // Setup input handlers with swipe support
            this.input.init(
                () => this.togglePause(),
                () => this.restart(),
                this.canvas  // Swipe target
            );
            
            // Setup difficulty buttons
            this.initDifficultyButtons();
            
            // Setup sound toggle
            this.initSoundToggle();
            
            // Setup theme buttons
            this.initThemeButtons();
            
            // Setup game mode selector
            this.initModeSelector();
            
            // Setup accessibility toggle
            this.initAccessibility();
            
            // Setup new features
            this.initSkinSelector();
            this.initMultiplayer();
            
            // Setup mute key (M)
            window.addEventListener('keydown', (e) => {
                if (e.code === 'KeyM') {
                    this.toggleSound();
                }
            });
            
            // Initialize audio on first interaction
            const initAudio = () => {
                this.audio.init();
                document.removeEventListener('keydown', initAudio);
                document.removeEventListener('click', initAudio);
                document.removeEventListener('touchstart', initAudio);
            };
            document.addEventListener('keydown', initAudio);
            document.addEventListener('click', initAudio);
            document.addEventListener('touchstart', initAudio);
            
            // Start boot sequence
            this.bootStartTime = performance.now();
            this.state = 'BOOT';
            
            // Start game loop
            this.lastTime = performance.now();
            this.loop(this.lastTime);
        }
        
        // ==================== THEME SELECTION ====================
        
        initThemeButtons() {
            const buttons = document.querySelectorAll('.theme-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const theme = e.target.dataset.theme;
                    if (theme) {
                        this.setTheme(theme);
                    }
                });
            });
        }
        
        setTheme(themeId) {
            if (!Themes[themeId]) return;
            
            this.currentTheme = themeId;
            this.renderer.setTheme(themeId);
            
            // Update button UI
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.theme === themeId) {
                    btn.classList.add('active');
                }
            });
        }
        
        // ==================== GAME MODE SELECTION ====================
        
        initModeSelector() {
            const buttons = document.querySelectorAll('.mode-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const mode = e.target.dataset.mode;
                    if (mode) {
                        this.setGameMode(mode);
                    }
                });
            });
        }
        
        setGameMode(modeId) {
            if (!GameModes[modeId]) return;
            
            this.currentMode = modeId;
            
            // Update button UI
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.mode === modeId) {
                    btn.classList.add('active');
                }
            });
            
            // Update UI visibility
            this.timerDisplay.style.display = (modeId === 'timed') ? 'block' : 'none';
            this.levelDisplay.style.display = (modeId === 'levels') ? 'block' : 'none';
            this.survivalWarning.style.display = 'none';
            
            // Show/hide multiplayer panel
            if (this.multiplayerPanel) {
                this.multiplayerPanel.style.display = (modeId === 'multiplayer') ? 'flex' : 'none';
            }
            
            // Show/hide boss health bar
            if (this.bossHealthContainer) {
                this.bossHealthContainer.style.display = (modeId === 'boss') ? 'flex' : 'none';
            }
            
            // Handle ghost mode
            this.isGhostMode = (modeId === 'ghost');
            if (this.isGhostMode) {
                this.loadBestReplay();
            }
            
            // Reset game with new mode
            if (this.state !== 'BOOT') {
                this.gameState.reset();
                this.particles.clear();
                this.input.clearBuffer();
                this.powerUpManager.reset();
                this.levelManager.reset();
                this.bossManager.reset();
                this.accumulator = 0;
                this.isNewHighScore = false;
                
                // Mode-specific initialization
                this.timedModeTimer = (modeId === 'timed') ? GameModes.timed.timeLimit : 0;
                this.survivalWarningShown = false;
                
                if (modeId === 'levels') {
                    this.levelManager.loadLevel(0);
                    this.gameState.spawnFood(this.levelManager);
                    this.updateLevelDisplay();
                }
                
                if (modeId === 'boss') {
                    this.bossManager.spawnBoss('python', this.gameState.gridWidth, this.gameState.gridHeight);
                    this.updateBossHealthBar();
                }
                
                this.updateScoreDisplay();
                this.updateSpeedDisplay();
                this.updateTimerDisplay();
                this.comboElement.classList.remove('active');
                this.survivalWarning.style.display = 'none';
                this.powerUpBar.innerHTML = '';
                
                // For multiplayer, don't start countdown until connected
                // For other modes, start immediately
                if (modeId !== 'multiplayer') {
                    this.startCountdown();
                } else {
                    // Set to a waiting state for multiplayer
                    this.state = 'PAUSED';
                    this.renderer.drawTextOverlay('MULTIPLAYER', 'Create or join a game to start');
                }
            }
        }
        
        // ==================== ACCESSIBILITY ====================
        
        initAccessibility() {
            if (this.accessibilityBtn) {
                this.accessibilityBtn.addEventListener('click', () => {
                    this.toggleAccessibility();
                });
            }
        }
        
        toggleAccessibility() {
            // Switch to colorblind-friendly theme
            if (this.currentTheme === 'grayscale') {
                this.setTheme('retro');
                this.accessibilityBtn.classList.remove('active');
            } else {
                this.setTheme('grayscale');
                this.accessibilityBtn.classList.add('active');
            }
        }
        
        // ==================== SKIN SELECTOR ====================
        
        initSkinSelector() {
            const toggle = document.getElementById('skinToggle');
            const dropdown = document.getElementById('skinDropdown');
            
            if (!toggle || !dropdown) return;
            
            // Toggle dropdown
            toggle.addEventListener('click', () => {
                const isVisible = dropdown.style.display !== 'none';
                dropdown.style.display = isVisible ? 'none' : 'grid';
                if (!isVisible) this.populateSkinDropdown();
            });
            
            // Close on outside click
            document.addEventListener('click', (e) => {
                if (!this.skinSelector.contains(e.target)) {
                    dropdown.style.display = 'none';
                }
            });
        }
        
        populateSkinDropdown() {
            const dropdown = document.getElementById('skinDropdown');
            if (!dropdown) return;
            
            dropdown.innerHTML = '';
            
            for (const skinId in SnakeSkins) {
                const skin = SnakeSkins[skinId];
                const isUnlocked = this.skinManager.isUnlocked(skinId);
                const isActive = this.currentSkin === skinId;
                
                const option = document.createElement('div');
                option.className = 'skin-option' + (isActive ? ' active' : '') + (!isUnlocked ? ' locked' : '');
                option.title = isUnlocked ? skin.name : `🔒 ${skin.unlockCondition || 'Locked'}`;
                
                // Handle colors - can be object {head, body, tail} or null for rainbow
                if (skin.colors) {
                    const colorValues = typeof skin.colors === 'object' 
                        ? Object.values(skin.colors) 
                        : [skin.colors];
                    option.style.background = colorValues.length > 1 
                        ? `linear-gradient(135deg, ${colorValues.join(', ')})` 
                        : colorValues[0];
                } else {
                    // Rainbow skin
                    option.style.background = 'linear-gradient(135deg, red, orange, yellow, green, blue, purple)';
                }
                
                if (isUnlocked) {
                    option.addEventListener('click', () => this.selectSkin(skinId));
                }
                
                dropdown.appendChild(option);
            }
        }
        
        selectSkin(skinId) {
            if (!this.skinManager.isUnlocked(skinId)) return;
            
            this.currentSkin = skinId;
            this.populateSkinDropdown();
            
            // Save selection
            try {
                localStorage.setItem('snakeSelectedSkin', skinId);
            } catch(e) {}
        }
        
        checkSkinUnlocks() {
            const stats = {
                score: this.gameState.score,
                wins: parseInt(localStorage.getItem('snakeWins') || '0'),
                perfectLevels: parseInt(localStorage.getItem('snakePerfectLevels') || '0'),
                gamesPlayed: parseInt(localStorage.getItem('snakeGamesPlayed') || '0'),
                maxCombo: this.gameState.combo
            };
            
            const newUnlocks = this.skinManager.checkUnlocks(stats);
            newUnlocks.forEach(skinId => this.showUnlockNotification(skinId));
        }
        
        showUnlockNotification(skinId) {
            const skin = SnakeSkins[skinId];
            if (!skin || !this.unlockNotification) return;
            
            this.unlockText.textContent = `${skin.name} Skin Unlocked!`;
            this.unlockNotification.style.display = 'flex';
            
            setTimeout(() => {
                this.unlockNotification.style.display = 'none';
            }, 3000);
        }
        
        // ==================== MULTIPLAYER ====================
        
        initMultiplayer() {
            const createBtn = document.getElementById('mpCreateBtn');
            const joinBtn = document.getElementById('mpJoinBtn');
            const confirmBtn = document.getElementById('mpConfirmBtn');
            const copyBtn = document.getElementById('mpCopyBtn');
            const codeInput = document.getElementById('mpCodeInput');
            
            // Setup multiplayer manager callbacks
            this.multiplayerManager.callbacks.onConnect = () => {
                this.updateMPStatus('Connected!', 'connected');
                document.getElementById('mpOpponent').style.display = 'block';
                
                // Reset game state fresh before starting
                this.gameState.reset();
                this.particles.clear();
                this.input.clearBuffer();
                this.accumulator = 0;
                this.isNewHighScore = false;
                
                this.startCountdown();
            };
            
            this.multiplayerManager.callbacks.onOpponentUpdate = (data) => {
                document.getElementById('opponentScore').textContent = data.score || 0;
            };
            
            this.multiplayerManager.callbacks.onDisconnect = () => {
                this.updateMPStatus('Opponent disconnected', '');
            };
            
            // Create game button
            if (createBtn) {
                createBtn.addEventListener('click', () => {
                    this.updateMPStatus('Creating game...', 'waiting');
                    this.multiplayerManager.createGame().then((code) => {
                        this.updateMPStatus('Waiting for opponent...', 'waiting');
                        document.getElementById('mpGameCode').style.display = 'flex';
                        document.getElementById('mpCodeDisplay').textContent = code;
                        document.getElementById('mpButtons').style.display = 'none';
                    }).catch((err) => {
                        // Show user-friendly error message
                        let errorMsg = 'Connection failed';
                        if (err.message?.includes('DISCONNECTED') || err.type === 'network') {
                            errorMsg = 'No internet connection';
                        } else if (err.message?.includes('server')) {
                            errorMsg = 'Server unavailable';
                        }
                        this.updateMPStatus(errorMsg + ' - try again', '');
                        document.getElementById('mpButtons').style.display = 'flex';
                    });
                });
            }
            
            // Join game button
            if (joinBtn) {
                joinBtn.addEventListener('click', () => {
                    document.getElementById('mpCodeContainer').style.display = 'flex';
                    document.getElementById('mpButtons').style.display = 'none';
                });
            }
            
            // Confirm join
            if (confirmBtn && codeInput) {
                confirmBtn.addEventListener('click', () => {
                    const code = codeInput.value.trim().toUpperCase();
                    if (code) {
                        this.updateMPStatus('Connecting...', 'waiting');
                        this.multiplayerManager.joinGame(code).then(() => {
                            this.updateMPStatus('Connected!', 'connected');
                        }).catch((err) => {
                            let errorMsg = 'Connection failed';
                            if (err.message?.includes('timeout')) {
                                errorMsg = 'Game not found or timed out';
                            } else if (err.message?.includes('DISCONNECTED')) {
                                errorMsg = 'No internet connection';
                            }
                            this.updateMPStatus(errorMsg, '');
                            document.getElementById('mpCodeContainer').style.display = 'none';
                            document.getElementById('mpButtons').style.display = 'flex';
                        });
                    }
                });
            }
            
            // Copy code button
            if (copyBtn) {
                copyBtn.addEventListener('click', () => {
                    const code = document.getElementById('mpCodeDisplay').textContent;
                    navigator.clipboard.writeText(code).catch(() => {});
                    copyBtn.textContent = '✓';
                    setTimeout(() => copyBtn.textContent = '📋', 1000);
                });
            }
        }
        
        updateMPStatus(text, statusClass) {
            const status = document.getElementById('mpStatus');
            if (status) {
                status.textContent = text;
                status.className = 'mp-status' + (statusClass ? ' ' + statusClass : '');
            }
        }
        
        // ==================== BOSS MODE ====================
        
        updateBossHealthBar() {
            if (!this.bossHealthFill || !this.bossManager.boss) return;
            
            const boss = this.bossManager.boss;
            const healthPercent = (boss.health / boss.maxHealth) * 100;
            this.bossHealthFill.style.width = healthPercent + '%';
            
            if (this.bossNameEl) {
                this.bossNameEl.textContent = boss.type.toUpperCase();
            }
        }
        
        // ==================== GHOST/REPLAY MODE ====================
        
        loadBestReplay() {
            const replayCode = localStorage.getItem('snakeBestReplay');
            if (replayCode) {
                this.ghostReplay = this.replayManager.importReplay(replayCode);
            } else {
                this.ghostReplay = null;
            }
        }
        
        saveBestReplay() {
            const code = this.replayManager.exportReplay();
            if (code) {
                localStorage.setItem('snakeBestReplay', code);
            }
        }
        
        // ==================== POWER-UP UI ====================
        
        updatePowerUpBar() {
            if (!this.powerUpBar) return;
            
            let html = '';
            for (const id in this.powerUpManager.activeEffects) {
                const effect = this.powerUpManager.activeEffects[id];
                const remaining = Math.ceil(effect.endTime - performance.now()) / 1000;
                html += `<div class="power-up-indicator" style="background: ${effect.type.color};">
                    ${effect.type.symbol} ${remaining.toFixed(1)}s
                </div>`;
            }
            this.powerUpBar.innerHTML = html;
        }
        // ==================== HIGH SCORE ====================
        
        loadHighScore() {
            try {
                const saved = localStorage.getItem('snakeHighScore');
                return saved ? parseInt(saved, 10) : 0;
            } catch (e) {
                return 0;  // localStorage not available
            }
        }
        
        saveHighScore() {
            try {
                localStorage.setItem('snakeHighScore', this.highScore.toString());
            } catch (e) {
                // localStorage not available
            }
        }
        
        checkHighScore() {
            if (this.gameState.score > this.highScore) {
                this.highScore = this.gameState.score;
                this.isNewHighScore = true;
                this.saveHighScore();
                this.updateHighScoreDisplay();
                return true;
            }
            this.isNewHighScore = false;
            return false;
        }
        
        updateHighScoreDisplay() {
            this.highScoreElement.textContent = this.highScore;
        }
        
        // ==================== SOUND TOGGLE ====================
        
        initSoundToggle() {
            this.soundToggle.addEventListener('click', () => this.toggleSound());
        }
        
        toggleSound() {
            const enabled = this.audio.toggle();
            this.soundToggle.textContent = enabled ? '🔊' : '🔇';
            this.soundToggle.classList.toggle('muted', !enabled);
        }
        
        // ==================== UI UPDATES ====================
        
        updateComboDisplay() {
            const combo = this.gameState.combo;
            if (combo > 1) {
                this.comboElement.textContent = `COMBO x${combo}`;
                this.comboElement.classList.add('active');
            } else {
                this.comboElement.classList.remove('active');
            }
        }
        
        updateSpeedDisplay() {
            this.speedElement.textContent = this.gameState.getSpeedLevel();
        }
        
        // ==================== SCREEN SHAKE ====================
        
        triggerScreenShake() {
            this.canvasWrapper.classList.add('shake');
            setTimeout(() => {
                this.canvasWrapper.classList.remove('shake');
            }, 400);
        }
        
        // ==================== COUNTDOWN ====================
        
        startCountdown() {
            this.state = 'COUNTDOWN';
            this.countdownValue = 3;
            this.countdownTimer = 0;
            this.countdownOverlay.style.display = 'flex';
            this.countdownNumber.textContent = '3';
            this.countdownNumber.className = 'countdown-number';
            this.audio.playCountdown();
            
            // Start replay recording (pass game state if available)
            try {
                this.replayManager.startRecording(this.gameState);
            } catch(e) {
                console.warn('Could not start replay recording:', e);
            }
        }
        
        updateCountdown(deltaTime) {
            this.countdownTimer += deltaTime;
            
            if (this.countdownTimer >= 800) {  // 800ms per count
                this.countdownTimer = 0;
                this.countdownValue--;
                
                if (this.countdownValue > 0) {
                    this.countdownNumber.textContent = this.countdownValue.toString();
                    // Re-trigger animation
                    this.countdownNumber.className = '';
                    void this.countdownNumber.offsetWidth;  // Force reflow
                    this.countdownNumber.className = 'countdown-number';
                    this.audio.playCountdown();
                } else if (this.countdownValue === 0) {
                    this.countdownNumber.textContent = 'GO!';
                    this.countdownNumber.className = 'countdown-number go';
                    this.audio.playGo();
                } else {
                    // Countdown finished
                    this.countdownOverlay.style.display = 'none';
                    this.state = 'PLAYING';
                }
            }
        }
        
        /**
         * Initialize difficulty selection buttons
         */
        initDifficultyButtons() {
            const buttons = document.querySelectorAll('.difficulty-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const difficulty = e.target.dataset.difficulty;
                    if (difficulty) {
                        this.setDifficulty(difficulty);
                    }
                });
            });
        }
        
        /**
         * Change game difficulty
         * @param {string} level - 'easy', 'medium', 'hard', 'insane'
         */
        setDifficulty(level) {
            // Update button UI
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.difficulty === level) {
                    btn.classList.add('active');
                }
            });
            
            // Update game state
            this.gameState.setDifficulty(level);
            
            // If not currently playing, reset to apply new difficulty
            if (this.state === 'GAME_OVER' || this.state === 'PAUSED') {
                this.gameState.reset();
                this.particles.clear();
                this.input.clearBuffer();
                this.accumulator = 0;
                this.isNewHighScore = false;
                this.updateScoreDisplay();
                this.updateSpeedDisplay();
                this.comboElement.classList.remove('active');
                this.startCountdown();
            } else if (this.state === 'BOOT') {
                // Will apply on first play
            } else {
                // Reset mid-game with new difficulty
                this.gameState.reset();
                this.particles.clear();
                this.input.clearBuffer();
                this.accumulator = 0;
                this.isNewHighScore = false;
                this.updateScoreDisplay();
                this.updateSpeedDisplay();
                this.comboElement.classList.remove('active');
            }
        }

        /**
         * Toggle pause state
         */
        togglePause() {
            if (this.state === 'PLAYING') {
                this.state = 'PAUSED';
                this.audio.playPause();
            } else if (this.state === 'PAUSED') {
                this.state = 'PLAYING';
                this.audio.playPause();
            }
        }

        /**
         * Restart game
         */
        restart() {
            if (this.state === 'GAME_OVER' || this.state === 'PAUSED') {
                this.gameState.reset();
                this.particles.clear();
                this.input.clearBuffer();
                this.powerUpManager.reset();
                this.levelManager.reset();
                this.accumulator = 0;
                this.isNewHighScore = false;
                
                // Reset mode-specific state
                this.timedModeTimer = (this.currentMode === 'timed') ? GameModes.timed.timeLimit : 0;
                this.survivalWarningShown = false;
                
                // Reset for levels mode
                if (this.currentMode === 'levels') {
                    this.levelManager.loadLevel(0);
                    this.gameState.spawnFood(this.levelManager);
                    this.updateLevelDisplay();
                }
                
                this.updateScoreDisplay();
                this.updateSpeedDisplay();
                this.updateTimerDisplay();
                this.comboElement.classList.remove('active');
                this.survivalWarning.style.display = 'none';
                this.powerUpBar.innerHTML = '';
                this.startCountdown();
            }
        }
        
        updateTimerDisplay() {
            if (this.currentMode === 'timed' && this.timerDisplay) {
                const seconds = Math.ceil(this.timedModeTimer / 1000);
                this.timerDisplay.textContent = `⏱️ ${seconds}s`;
            }
        }
        
        updateLevelDisplay() {
            if (this.levelDisplay) {
                this.levelDisplay.textContent = `📍 ${this.levelManager.getLevelName()}`;
            }
        }

        /**
         * Update score display in DOM
         */
        updateScoreDisplay() {
            this.scoreElement.textContent = this.gameState.score;
        }

        /**
         * Process one game tick
         */
        tick() {
            // Process buffered input
            const newDir = this.input.consumeInput();
            if (newDir) {
                this.gameState.setDirection(newDir);
                // Record input for replay
                if (this.replayManager.isRecording) {
                    this.replayManager.recordInput(newDir);
                }
            }
            
            // Store food position before update (for particles)
            const foodPos = this.gameState.food ? {
                x: this.gameState.food.x * GameConfig.CELL_SIZE + GameConfig.CELL_SIZE / 2,
                y: this.gameState.food.y * GameConfig.CELL_SIZE + GameConfig.CELL_SIZE / 2
            } : null;
            
            // Get occupied cells for power-up spawning
            const levelManager = (this.currentMode === 'levels' || this.currentMode === 'survival') 
                ? this.levelManager : null;
            
            // Update game state with managers
            const result = this.gameState.update(levelManager, this.powerUpManager);
            
            // Update boss if in boss mode
            if (this.currentMode === 'boss' && this.bossManager.boss) {
                const head = this.gameState.snake[0];
                const foodPos = this.gameState.food;
                this.bossManager.update(16, head, foodPos, GameConfig.GRID_SIZE);
                
                // Check if boss hit player
                if (this.bossManager.checkCollisionWithSnake(this.gameState.snake)) {
                    // Player takes damage (boss hits = instant death for now)
                    this.state = 'GAME_OVER';
                    this.audio.playDeath();
                    this.triggerScreenShake();
                    this.checkHighScore();
                    return;
                }
                
                // Check if player hit boss (head collision)
                if (this.bossManager.checkPlayerAttack(head)) {
                    this.audio.playEat();
                    this.updateBossHealthBar();
                    this.particles.emit(
                        head.x * GameConfig.CELL_SIZE + GameConfig.CELL_SIZE / 2,
                        head.y * GameConfig.CELL_SIZE + GameConfig.CELL_SIZE / 2,
                        '#ff4040', 20
                    );
                    
                    // Boss defeated
                    if (this.bossManager.boss.health <= 0) {
                        this.gameState.score += 500; // Bonus for defeating boss
                        this.updateScoreDisplay();
                        // Spawn next boss or win
                        this.bossManager.reset();
                    }
                }
            }
            
            // Sync multiplayer state
            if (this.currentMode === 'multiplayer' && this.multiplayerManager.isConnected) {
                this.multiplayerManager.sendState(
                    this.gameState.snake,
                    this.gameState.score,
                    this.gameState.direction
                );
            }
            
            // Check power-up collection
            const head = this.gameState.snake[0];
            const collectedPowerUp = this.powerUpManager.checkCollection(head.x, head.y);
            if (collectedPowerUp) {
                this.audio.playPowerUp();
                this.particles.emit(
                    head.x * GameConfig.CELL_SIZE + GameConfig.CELL_SIZE / 2,
                    head.y * GameConfig.CELL_SIZE + GameConfig.CELL_SIZE / 2,
                    collectedPowerUp.color, 15
                );
            }
            
            switch (result) {
                case 'eat':
                    // Maybe spawn power-up
                    const occupiedCells = [...this.gameState.snake];
                    if (this.gameState.food) occupiedCells.push(this.gameState.food);
                    if (levelManager) {
                        levelManager.getAllObstacles().forEach(w => occupiedCells.push(w));
                    }
                    this.powerUpManager.trySpawn(this.gameState.score, occupiedCells, GameConfig.GRID_SIZE);
                    
                    // Spawn particles at food position
                    if (foodPos) {
                        if (this.gameState.combo > 1) {
                            this.particles.emitCombo(foodPos.x, foodPos.y, this.gameState.combo);
                            this.audio.playCombo(this.gameState.combo);
                        } else {
                            this.particles.emit(foodPos.x, foodPos.y, '#ff0040', 8);
                            this.audio.playEat();
                        }
                    }
                    this.updateScoreDisplay();
                    this.updateComboDisplay();
                    this.updateSpeedDisplay();
                    
                    // Check for skin unlocks
                    this.checkSkinUnlocks();
                    break;
                case 'levelup':
                    this.audio.playLevelUp();
                    this.particles.emitCombo(200, 200, 10);  // Big celebration
                    this.updateLevelDisplay();
                    break;
                case 'portal':
                    this.audio.playPortal();
                    break;
                case 'death':
                    this.state = 'GAME_OVER';
                    this.audio.playDeath();
                    this.triggerScreenShake();
                    this.checkHighScore();
                    
                    // Save replay if it's a new high score
                    if (this.isNewHighScore) {
                        this.replayManager.stopRecording();
                        this.saveBestReplay();
                    }
                    break;
                case 'win':
                    // Rare edge case: player filled entire grid!
                    this.state = 'GAME_OVER';
                    this.checkHighScore();
                    break;
            }
        }

        /**
         * Main game loop with fixed timestep for deterministic logic.
         * 
         * WHY FIXED TIMESTEP?
         * Variable timesteps cause movement speed to vary with frame rate.
         * On a 144Hz monitor the snake would move faster than on 60Hz.
         * Fixed timestep decouples logic updates from render frequency.
         * 
         * The accumulator stores "leftover" time between frames, ensuring
         * logic ticks happen at consistent intervals regardless of actual
         * frame timing.
         */
        loop(currentTime) {
            const deltaTime = currentTime - this.lastTime;
            this.lastTime = currentTime;
            
            // Handle boot screen
            if (this.state === 'BOOT') {
                const bootProgress = (currentTime - this.bootStartTime) / GameConfig.BOOT_DURATION;
                
                if (bootProgress >= 1) {
                    this.startCountdown();
                } else {
                    this.renderer.drawBootScreen(bootProgress);
                }
                
                this.animationId = requestAnimationFrame((t) => this.loop(t));
                return;
            }
            
            // Handle countdown
            if (this.state === 'COUNTDOWN') {
                this.updateCountdown(deltaTime);
                this.renderWithExtras(deltaTime);
                this.animationId = requestAnimationFrame((t) => this.loop(t));
                return;
            }
            
            // Update particles
            this.particles.update(deltaTime);
            
            // Update power-ups
            this.powerUpManager.update();
            this.updatePowerUpBar();
            
            // Update combo timer
            if (this.state === 'PLAYING') {
                this.gameState.updateCombo(deltaTime);
                
                // Check if combo expired and update UI
                if (this.gameState.combo === 0) {
                    this.comboElement.classList.remove('active');
                }
                
                // Handle timed mode
                if (this.currentMode === 'timed') {
                    this.timedModeTimer -= deltaTime;
                    this.updateTimerDisplay();
                    
                    if (this.timedModeTimer <= 0) {
                        // Time's up!
                        this.state = 'GAME_OVER';
                        this.audio.playDeath();
                        this.checkHighScore();
                    }
                }
                
                // Handle survival mode - walls close in
                if (this.currentMode === 'survival') {
                    const wallsAdded = this.levelManager.updateSurvivalWalls(deltaTime, GameConfig.GRID_SIZE);
                    if (wallsAdded && !this.survivalWarningShown) {
                        this.survivalWarning.style.display = 'block';
                        this.survivalWarningShown = true;
                        setTimeout(() => {
                            this.survivalWarning.style.display = 'none';
                        }, 2000);
                    }
                }
            }
            
            // Fixed timestep updates (only when playing)
            if (this.state === 'PLAYING') {
                // Use modified speed from power-ups
                const moveInterval = this.gameState.getMoveInterval(this.powerUpManager);
                this.accumulator += deltaTime;
                
                // Process ticks at fixed interval
                while (this.accumulator >= moveInterval) {
                    this.tick();
                    this.accumulator -= moveInterval;
                    
                    // Break if game ended during tick
                    if (this.state !== 'PLAYING') break;
                }
            }
            
            // Render current state with all extras
            this.renderWithExtras(deltaTime);
            
            // Continue loop
            this.animationId = requestAnimationFrame((t) => this.loop(t));
        }
        
        /**
         * Enhanced render that includes walls, portals, power-ups
         */
        renderWithExtras(deltaTime) {
            this.renderer.drawBackground();
            
            // Draw level elements
            const levelManager = (this.currentMode === 'levels' || this.currentMode === 'survival') 
                ? this.levelManager : null;
            
            if (levelManager) {
                this.renderer.drawWalls(levelManager.getAllObstacles());
                this.renderer.drawPortals(levelManager.portals, deltaTime);
            }
            
            // Draw power-up
            this.renderer.drawPowerUp(this.powerUpManager.activePowerUp, deltaTime);
            
            // Draw food
            this.renderer.drawFood(this.gameState.food, deltaTime);
            
            // Draw ghost replay snake (behind player)
            if (this.isGhostMode && this.ghostReplay && this.ghostReplay.ghostSnake) {
                this.renderer.drawGhostSnake(this.ghostReplay.ghostSnake);
            }
            
            // Draw boss snake
            if (this.currentMode === 'boss' && this.bossManager.boss) {
                this.renderer.drawBossSnake(this.bossManager.boss);
            }
            
            // Draw snake with effects
            const isGhost = this.powerUpManager.hasEffect('ghost');
            if (isGhost) {
                this.renderer.drawSnakeWithEffects(this.gameState.snake, true);
            } else {
                this.renderer.drawSnake(this.gameState.snake, this.currentSkin);
            }
            
            // Render particles on top
            this.particles.render(this.renderer.ctx);
            
            // Draw overlays
            if (this.state === 'PAUSED') {
                this.renderer.drawTextOverlay('PAUSED', 'Press SPACE to continue');
            } else if (this.state === 'GAME_OVER') {
                const diffName = this.gameState.difficulty.name;
                const modeInfo = this.currentMode !== 'classic' ? ` | ${GameModes[this.currentMode].name}` : '';
                const title = this.isNewHighScore ? 'NEW HIGH SCORE!' : 'GAME OVER';
                const color = this.isNewHighScore ? this.renderer.colors.ACCENT : this.renderer.colors.FOOD;
                this.renderer.drawTextOverlay(
                    title,
                    `${diffName}${modeInfo} | Score: ${this.gameState.score} | Press ENTER`,
                    color
                );
            }
        }

        /**
         * Cleanup method for proper resource disposal
         */
        destroy() {
            if (this.animationId) {
                cancelAnimationFrame(this.animationId);
            }
            this.input.destroy();
        }
    }

    // ==========================================================================
    // INITIALIZATION
    // ==========================================================================
    
    // Expose game instance for debugging (optional)
    let game;

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            game = new Game();
        });
    } else {
        game = new Game();
