<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Personal portfolio — launching soon." />
		<title>Ashish — Portfolio (Launching Soon)</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&amp;display=swap" rel="stylesheet" />
		<style>
			:root {
				--bg0: #070a12;
				--bg1: #0b1020;
				--card: rgba(255, 255, 255, 0.06);
				--cardBorder: rgba(255, 255, 255, 0.12);
				--text: rgba(255, 255, 255, 0.92);
				--muted: rgba(255, 255, 255, 0.7);
				--accent: #7c5cff;
				--accent2: #22d3ee;
				--neonGreen: #39ff14;
				--neonCyan: #22d3ee;
				--neonPink: #ff6ec7;
				--neonYellow: #ffe600;
				--retroBg: #1a2332;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				height: 100%;
			}

			body {
				margin: 0;
				color: var(--text);
				font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
					Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
				background:
					radial-gradient(900px 600px at 20% 10%, rgba(124, 92, 255, 0.32), transparent 55%),
					radial-gradient(700px 500px at 85% 30%, rgba(34, 211, 238, 0.24), transparent 55%),
					linear-gradient(180deg, var(--bg0), var(--bg1));
				display: grid;
				place-items: center;
				padding: 28px;
			}

			.wrap {
				width: min(980px, 100%);
			}

			.hero {
				border: 1px solid var(--cardBorder);
				background: var(--card);
				backdrop-filter: blur(10px);
				border-radius: 18px;
				padding: 28px;
				box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
			}

			h1 {
				margin: 0;
				letter-spacing: -0.02em;
				font-size: clamp(28px, 3.5vw, 44px);
				line-height: 1.08;
			}

			.sub {
				margin: 12px 0 0;
				color: var(--muted);
				font-size: 16px;
				line-height: 1.6;
				max-width: 70ch;
			}

			.launch {
				margin-top: 22px;
				display: grid;
				gap: 14px;
			}

			.pill {
				display: inline-flex;
				align-items: center;
				gap: 10px;
				width: fit-content;
				padding: 8px 12px;
				border-radius: 999px;
				border: 1px solid rgba(255, 255, 255, 0.14);
				background: rgba(255, 255, 255, 0.04);
				color: var(--muted);
				font-size: 13px;
			}

			.dot {
				width: 9px;
				height: 9px;
				border-radius: 50%;
				background: linear-gradient(135deg, var(--accent), var(--accent2));
				box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.16);
			}

			.countdown {
				display: grid;
				grid-template-columns: repeat(4, minmax(0, 1fr));
				gap: 12px;
			}

			.tile {
				border: 1px solid rgba(255, 255, 255, 0.12);
				background: rgba(0, 0, 0, 0.18);
				border-radius: 14px;
				padding: 14px;
				text-align: center;
			}

			.num {
				font-variant-numeric: tabular-nums;
				letter-spacing: -0.02em;
				font-size: clamp(26px, 4vw, 40px);
				line-height: 1.1;
			}

			.label {
				margin-top: 6px;
				font-size: 12px;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.12em;
			}

			.liveLine {
				margin: 0;
				color: var(--muted);
				font-size: 14px;
			}

			.dateStrong {
				color: var(--text);
				font-weight: 600;
			}

			.divider {
				margin: 22px 0;
				border: none;
				height: 1px;
				background: linear-gradient(
					90deg,
					transparent,
					rgba(255, 255, 255, 0.18),
					transparent
				);
			}

			.grid {
				display: grid;
				gap: 12px;
			}

			.select,
			.button {
				border: 1px solid rgba(255, 255, 255, 0.14);
				background: rgba(255, 255, 255, 0.06);
				color: var(--text);
				border-radius: 12px;
				padding: 10px 12px;
				font: inherit;
				outline: none;
			}

			.button {
				cursor: pointer;
				transition: transform 120ms ease, background 120ms ease;
			}

			.button:active {
				transform: translateY(1px);
			}

			.help {
				color: var(--muted);
				font-size: 13px;
				margin: 0;
			}

			/* ===================== */
			/* RETRO TIC-TAC-TOE     */
			/* ===================== */
			.tttContainer {
				display: grid;
				grid-template-columns: 1fr 260px;
				gap: 18px;
				align-items: start;
			}

			.tttMain {
				background: var(--retroBg);
				border: 4px solid var(--neonGreen);
				border-radius: 18px;
				padding: 18px;
				box-shadow:
					0 0 20px rgba(57, 255, 20, 0.25),
					inset 0 0 40px rgba(0, 0, 0, 0.5);
			}

			.tttTitle {
				font-family: 'Press Start 2P', monospace;
				font-size: clamp(18px, 3vw, 28px);
				text-align: center;
				margin: 0 0 14px;
				color: var(--neonGreen);
				text-shadow:
					0 0 8px var(--neonGreen),
					0 0 20px var(--neonGreen);
				letter-spacing: 0.12em;
			}

			.tttControls {
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
				align-items: center;
				justify-content: center;
				margin-bottom: 14px;
			}

			.tttControls .select,
			.tttControls .button {
				font-family: 'Press Start 2P', monospace;
				font-size: 10px;
				padding: 8px 10px;
				border-color: var(--neonGreen);
				background: rgba(57, 255, 20, 0.08);
				color: var(--neonGreen);
			}

			.tttControls .button:hover {
				background: rgba(57, 255, 20, 0.18);
			}

			.tttStatus {
				font-family: 'Press Start 2P', monospace;
				font-size: 11px;
				text-align: center;
				margin: 0 0 10px;
				color: var(--neonYellow);
				text-shadow: 0 0 6px var(--neonYellow);
				min-height: 32px;
			}

			.tttBoardWrap {
				display: flex;
				justify-content: center;
			}

			.tttBoard {
				display: grid;
				grid-template-columns: 40px repeat(3, 1fr);
				grid-template-rows: 40px repeat(3, 1fr);
				gap: 6px;
				max-width: 340px;
			}

			.tttColLabel,
			.tttRowLabel {
				font-family: 'Press Start 2P', monospace;
				font-size: 14px;
				color: var(--neonGreen);
				display: grid;
				place-items: center;
				text-shadow: 0 0 6px var(--neonGreen);
			}

			.tttCell {
				appearance: none;
				border: 3px dashed rgba(57, 255, 20, 0.5);
				background: rgba(0, 0, 0, 0.4);
				border-radius: 10px;
				width: 90px;
				height: 90px;
				cursor: pointer;
				font-family: 'Press Start 2P', monospace;
				font-size: 48px;
				font-weight: 700;
				color: var(--text);
				transition: transform 100ms ease, border-color 100ms ease, background 100ms ease;
			}

			.tttCell:hover:not(:disabled) {
				transform: scale(1.03);
				border-color: var(--neonGreen);
				background: rgba(57, 255, 20, 0.08);
			}

			.tttCell:disabled {
				cursor: not-allowed;
			}

			.tttCell.X {
				color: var(--neonCyan);
				text-shadow: 0 0 12px var(--neonCyan);
			}

			.tttCell.O {
				color: var(--neonPink);
				text-shadow: 0 0 12px var(--neonPink);
			}

			.tttCell.win {
				border-color: var(--neonYellow);
				background: rgba(255, 230, 0, 0.12);
				box-shadow: 0 0 16px rgba(255, 230, 0, 0.4);
			}

			.tttMoveHistory {
				margin-top: 14px;
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 8px;
				font-family: 'Press Start 2P', monospace;
				font-size: 9px;
			}

			.tttMoveCol {
				background: rgba(0, 0, 0, 0.3);
				border: 2px solid rgba(255, 255, 255, 0.15);
				border-radius: 8px;
				padding: 8px;
			}

			.tttMoveColTitle {
				text-align: center;
				margin-bottom: 6px;
				padding-bottom: 4px;
				border-bottom: 1px solid rgba(255, 255, 255, 0.15);
			}

			.tttMoveColTitle.X {
				color: var(--neonCyan);
			}

			.tttMoveColTitle.O {
				color: var(--neonPink);
			}

			.tttMoveList {
				list-style: none;
				margin: 0;
				padding: 0;
				max-height: 80px;
				overflow-y: auto;
			}

			.tttMoveList li {
				padding: 2px 0;
				color: var(--muted);
			}

			/* Sidebar: Leaderboard */
			.tttSidebar {
				background: rgba(0, 0, 0, 0.5);
				border: 3px solid var(--neonYellow);
				border-radius: 14px;
				padding: 14px;
				box-shadow: 0 0 14px rgba(255, 230, 0, 0.2);
			}

			.tttSidebarTitle {
				font-family: 'Press Start 2P', monospace;
				font-size: 12px;
				text-align: center;
				margin: 0 0 10px;
				color: var(--neonYellow);
				text-shadow: 0 0 6px var(--neonYellow);
			}

			.tttLeaderboard {
				list-style: none;
				margin: 0;
				padding: 0;
				font-family: 'Press Start 2P', monospace;
				font-size: 9px;
				max-height: 220px;
				overflow-y: auto;
			}

			.tttLeaderboard li {
				display: flex;
				justify-content: space-between;
				padding: 5px 4px;
				border-bottom: 1px solid rgba(255, 255, 255, 0.1);
				color: var(--muted);
			}

			.tttLeaderboard li:nth-child(1) {
				color: #ffd700;
			}

			.tttLeaderboard li:nth-child(2) {
				color: #c0c0c0;
			}

			.tttLeaderboard li:nth-child(3) {
				color: #cd7f32;
			}

			.tttLeaderboard .rank {
				width: 22px;
			}

			.tttLeaderboard .name {
				flex: 1;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
				padding: 0 6px;
			}

			.tttLeaderboard .wins {
				width: 40px;
				text-align: right;
			}

			.tttUserWrap {
				margin-top: 14px;
				display: grid;
				gap: 8px;
			}

			.tttUserLabel {
				font-family: 'Press Start 2P', monospace;
				font-size: 9px;
				color: var(--neonGreen);
			}

			.tttUserInput {
				font-family: 'Press Start 2P', monospace;
				font-size: 10px;
				padding: 8px;
				border: 2px solid var(--neonGreen);
				border-radius: 8px;
				background: rgba(0, 0, 0, 0.4);
				color: var(--text);
				outline: none;
			}

			.tttUserInput:focus {
				box-shadow: 0 0 8px var(--neonGreen);
			}

			.tttUserStats {
				font-family: 'Press Start 2P', monospace;
				font-size: 9px;
				color: var(--muted);
				text-align: center;
			}

			/* ===================== */
			/* RETRO SNAKE GAME     */
			/* ===================== */
			.snakeContainer {
				display: grid;
				grid-template-columns: 1fr 260px;
				gap: 18px;
				align-items: start;
			}

			.snakeMain {
				background: var(--retroBg);
				border: 4px solid var(--neonCyan);
				border-radius: 18px;
				padding: 18px;
				box-shadow:
					0 0 20px rgba(34, 211, 238, 0.25),
					inset 0 0 40px rgba(0, 0, 0, 0.5);
			}

			.snakeTitle {
				font-family: 'Press Start 2P', monospace;
				font-size: clamp(18px, 3vw, 28px);
				text-align: center;
				margin: 0 0 14px;
				color: var(--neonCyan);
				text-shadow:
					0 0 8px var(--neonCyan),
					0 0 20px var(--neonCyan);
				letter-spacing: 0.12em;
			}

			.snakeControls {
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
				align-items: center;
				justify-content: center;
				margin-bottom: 14px;
			}

			.snakeControls .select,
			.snakeControls .button {
				font-family: 'Press Start 2P', monospace;
				font-size: 10px;
				padding: 8px 10px;
				border-color: var(--neonCyan);
				background: rgba(34, 211, 238, 0.08);
				color: var(--neonCyan);
			}

			.snakeControls .button:hover {
				background: rgba(34, 211, 238, 0.18);
			}

			.snakeStatus {
				font-family: 'Press Start 2P', monospace;
				font-size: 11px;
				text-align: center;
				margin: 0 0 10px;
				color: var(--neonYellow);
				text-shadow: 0 0 6px var(--neonYellow);
				min-height: 20px;
			}

			.snakeStats {
				font-family: 'Press Start 2P', monospace;
				font-size: 10px;
				text-align: center;
				margin: 0 0 14px;
				color: var(--neonPink);
				text-shadow: 0 0 6px var(--neonPink);
			}

			.snakeWrap {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 14px;
			}

			.snakeCanvas {
				width: 100%;
				max-width: 360px;
				aspect-ratio: 1 / 1;
				border-radius: 12px;
				border: 3px dashed rgba(34, 211, 238, 0.5);
				background: rgba(0, 0, 0, 0.4);
				display: block;
			}

			.snakeHelp {
				font-family: 'Press Start 2P', monospace;
				font-size: 8px;
				color: var(--muted);
				text-align: center;
				margin: 0;
			}

			.dpad {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 8px;
				max-width: 200px;
			}

			.dpad .button {
				font-family: 'Press Start 2P', monospace;
				font-size: 9px;
				padding: 12px 8px;
				border-radius: 10px;
				border-color: var(--neonCyan);
				background: rgba(34, 211, 238, 0.08);
				color: var(--neonCyan);
			}

			.dpad .button:hover {
				background: rgba(34, 211, 238, 0.18);
			}

			.dpad .blank {
				opacity: 0;
				pointer-events: none;
			}

			/* Snake Sidebar */
			.snakeSidebar {
				background: rgba(0, 0, 0, 0.5);
				border: 3px solid var(--neonPink);
				border-radius: 14px;
				padding: 14px;
				box-shadow: 0 0 14px rgba(255, 110, 199, 0.2);
			}

			.snakeSidebarTitle {
				font-family: 'Press Start 2P', monospace;
				font-size: 12px;
				text-align: center;
				margin: 0 0 10px;
				color: var(--neonPink);
				text-shadow: 0 0 6px var(--neonPink);
			}

			.snakeLeaderboard {
				list-style: none;
				margin: 0;
				padding: 0;
				font-family: 'Press Start 2P', monospace;
				font-size: 9px;
				max-height: 220px;
				overflow-y: auto;
			}

			.snakeLeaderboard li {
				display: flex;
				justify-content: space-between;
				padding: 5px 4px;
				border-bottom: 1px solid rgba(255, 255, 255, 0.1);
				color: var(--muted);
			}

			.snakeLeaderboard li:nth-child(1) {
				color: #ffd700;
			}

			.snakeLeaderboard li:nth-child(2) {
				color: #c0c0c0;
			}

			.snakeLeaderboard li:nth-child(3) {
				color: #cd7f32;
			}

			.snakeLeaderboard .rank {
				width: 22px;
			}

			.snakeLeaderboard .name {
				flex: 1;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
				padding: 0 6px;
			}

			.snakeLeaderboard .score {
				width: 50px;
				text-align: right;
			}

			.snakeUserWrap {
				margin-top: 14px;
				display: grid;
				gap: 8px;
			}

			.snakeUserLabel {
				font-family: 'Press Start 2P', monospace;
				font-size: 9px;
				color: var(--neonCyan);
			}

			.snakeUserInput {
				font-family: 'Press Start 2P', monospace;
				font-size: 10px;
				padding: 8px;
				border: 2px solid var(--neonCyan);
				border-radius: 8px;
				background: rgba(0, 0, 0, 0.4);
				color: var(--text);
				outline: none;
			}

			.snakeUserInput:focus {
				box-shadow: 0 0 8px var(--neonCyan);
			}

			.snakeUserStats {
				font-family: 'Press Start 2P', monospace;
				font-size: 9px;
				color: var(--muted);
				text-align: center;
			}

			/* Tabs */
			.tabs {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				margin: 0 0 12px;
			}

			.tabButton {
				border: 1px solid rgba(255, 255, 255, 0.14);
				background: rgba(255, 255, 255, 0.06);
				color: var(--text);
				border-radius: 999px;
				padding: 8px 12px;
				font: inherit;
				cursor: pointer;
				transition: transform 120ms ease, background 120ms ease,
					border-color 120ms ease;
			}

			.tabButton:active {
				transform: translateY(1px);
			}

			.tabButton[aria-pressed="true"] {
				background: linear-gradient(
					135deg,
					rgba(124, 92, 255, 0.26),
					rgba(34, 211, 238, 0.18)
				);
				border-color: rgba(255, 255, 255, 0.22);
			}

			.gamePanel {
				display: none;
			}

			.gamePanel.active {
				display: block;
			}

			/* ===================== */
			/* iOS LIQUID GLASS LOOK */
			/* ===================== */
			body {
				background:
					radial-gradient(1000px 700px at 18% 8%, rgba(124, 92, 255, 0.34), transparent 60%),
					radial-gradient(900px 700px at 92% 22%, rgba(34, 211, 238, 0.26), transparent 60%),
					radial-gradient(800px 700px at 55% 110%, rgba(255, 110, 199, 0.16), transparent 55%),
					linear-gradient(180deg, #060812 0%, #070b18 45%, #070a12 100%);
			}

			body::before {
				content: "";
				position: fixed;
				inset: -20%;
				background:
					radial-gradient(closest-side at 30% 30%, rgba(255, 255, 255, 0.08), transparent 55%),
					radial-gradient(closest-side at 70% 60%, rgba(255, 255, 255, 0.06), transparent 60%);
				filter: blur(18px);
				transform: translateZ(0);
				animation: floatGlow 14s ease-in-out infinite alternate;
				pointer-events: none;
				z-index: 0;
			}

			@keyframes floatGlow {
				from {
					transform: translate3d(-1.2%, -0.6%, 0) scale(1);
					opacity: 0.85;
				}
				to {
					transform: translate3d(1.2%, 0.6%, 0) scale(1.02);
					opacity: 1;
				}
			}

			.wrap,
			.hero {
				position: relative;
				z-index: 1;
			}

			.hero {
				border: 1px solid rgba(255, 255, 255, 0.16);
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.05));
				backdrop-filter: blur(22px) saturate(140%);
				-webkit-backdrop-filter: blur(22px) saturate(140%);
				border-radius: 24px;
				box-shadow:
					0 26px 90px rgba(0, 0, 0, 0.55),
					inset 0 1px 0 rgba(255, 255, 255, 0.20);
				overflow: hidden;
			}

			.hero::before {
				content: "";
				position: absolute;
				inset: 0;
				background:
					radial-gradient(900px 420px at 18% 18%, rgba(255, 255, 255, 0.16), transparent 60%),
					radial-gradient(700px 520px at 90% 0%, rgba(34, 211, 238, 0.14), transparent 55%),
					radial-gradient(720px 520px at 0% 110%, rgba(124, 92, 255, 0.12), transparent 55%);
				mix-blend-mode: screen;
				opacity: 0.9;
				pointer-events: none;
			}

			.hero::after {
				content: "";
				position: absolute;
				inset: 0;
				background: linear-gradient(
					135deg,
					rgba(255, 255, 255, 0.18),
					transparent 35%,
					transparent 65%,
					rgba(255, 255, 255, 0.06)
				);
				opacity: 0.6;
				pointer-events: none;
			}

			.pill {
				border: 1px solid rgba(255, 255, 255, 0.18);
				background: rgba(255, 255, 255, 0.06);
				backdrop-filter: blur(14px);
			}

			.tile {
				position: relative;
				border: 1px solid rgba(255, 255, 255, 0.16);
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.04));
				backdrop-filter: blur(18px) saturate(150%);
				-webkit-backdrop-filter: blur(18px) saturate(150%);
				box-shadow:
					0 18px 50px rgba(0, 0, 0, 0.35),
					inset 0 1px 0 rgba(255, 255, 255, 0.18);
				overflow: hidden;
			}

			.tile::before {
				content: "";
				position: absolute;
				inset: 0;
				background:
					radial-gradient(160px 90px at 22% 18%, rgba(255, 255, 255, 0.22), transparent 60%),
					radial-gradient(160px 120px at 85% 105%, rgba(124, 92, 255, 0.12), transparent 60%);
				opacity: 0.9;
				pointer-events: none;
			}

			.num {
				text-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
			}

			@media (max-width: 760px) {
				.tttContainer,
				.snakeContainer {
					grid-template-columns: 1fr;
				}

				.tttCell {
					width: 70px;
					height: 70px;
					font-size: 36px;
				}

				.tttBoard {
					grid-template-columns: 30px repeat(3, 1fr);
					grid-template-rows: 30px repeat(3, 1fr);
				}

				.tttColLabel,
				.tttRowLabel {
					font-size: 11px;
				}
			}

			@media (max-width: 560px) {
				.hero {
					padding: 20px;
				}

				.countdown {
					grid-template-columns: repeat(2, minmax(0, 1fr));
				}

				.tttCell {
					width: 60px;
					height: 60px;
					font-size: 28px;
				}
			}

			/* ====================================================== */
			/* COMING SOON (match provided reference countdown design) */
			/* ====================================================== */
			.comingPage {
				background: #fbf7ef;
				color: #111;
				font-family: ui-serif, "Playfair Display", Georgia, "Times New Roman", serif;
				min-height: 100vh;
				display: flex;
				align-items: flex-end;
				justify-content: flex-end;

			.comingPage::before {

			.comingPage .wrap {
				width: auto;
				margin: 0;

				background: transparent;
				backdrop-filter: none;

			.comingPage .hero::before,

			.srOnly {

			.comingPage .num {

		</style>
	</head>
	<body class="comingPage">
		<main class="wrap">
			<section class="hero" aria-labelledby="title">
				<h1 class="srOnly" id="title">Coming soon</h1>

				<div class="countdown" aria-live="polite" aria-atomic="true">
					<div class="tile">
						<span class="num" id="days">—</span><span class="unit">d</span>
					</div>
					<div class="tile">
						<span class="num" id="hours">—</span><span class="unit">h</span>
					</div>
					<div class="tile">
						<span class="num" id="minutes">—</span><span class="unit">m</span>
					</div>
					<div class="tile secondsTile" aria-hidden="true">
						<span class="num" id="seconds">—</span><span class="unit">s</span>
					</div>
				</div>
			</section>
		</main>

		<script>
			(function () {
				// ===================
				// Countdown Timer
				// ===================
				const daysEl = document.getElementById("days");
				const hoursEl = document.getElementById("hours");
				const minutesEl = document.getElementById("minutes");
				const secondsEl = document.getElementById("seconds");

				function getEndOfNextMonth(now) {
					return new Date(now.getFullYear(), now.getMonth() + 2, 0, 23, 59, 59, 999);
				}

				const target = getEndOfNextMonth(new Date());

				function pad2(value) {
					return String(value).padStart(2, "0");
				}

				function tick() {
					const now = new Date();
					const diffMs = target.getTime() - now.getTime();

					if (diffMs <= 0) {
						daysEl.textContent = "0";
						hoursEl.textContent = "00";
						minutesEl.textContent = "00";
						secondsEl.textContent = "00";
						clearInterval(countdownTimer);
						return;
					}

					const totalSeconds = Math.floor(diffMs / 1000);
					const days = Math.floor(totalSeconds / (60 * 60 * 24));
					const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
					const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
					const seconds = totalSeconds % 60;

					daysEl.textContent = String(days);
					hoursEl.textContent = pad2(hours);
					minutesEl.textContent = pad2(minutes);
					secondsEl.textContent = pad2(seconds);
				}

				tick();
				const countdownTimer = setInterval(tick, 1000);

				return; // keep any leftover removed-game code from running

				// ===================
				// Game Tabs
				// ===================
				const gameTabsEl = document.getElementById("gameTabs");
				const tttPanel = document.getElementById("tttPanel");
				const snakePanel = document.getElementById("snakePanel");

				function setGameView(view) {
					const panels = { ttt: tttPanel, snake: snakePanel };
					for (const [key, panel] of Object.entries(panels)) {
						panel.classList.toggle("active", key === view);
					}
					for (const btn of Array.from(gameTabsEl.querySelectorAll(".tabButton"))) {
						btn.setAttribute("aria-pressed", btn.getAttribute("data-view") === view ? "true" : "false");
					}
					localStorage.setItem("gameView", view);
					if (view !== "snake") snakePause();
				}

				gameTabsEl.addEventListener("click", (event) => {
					const target = event.target;
					if (!(target instanceof HTMLElement)) return;
					const btn = target.closest(".tabButton");
					if (!(btn instanceof HTMLButtonElement)) return;
					const view = btn.getAttribute("data-view") || "ttt";
					setGameView(view);
				});

				setGameView(localStorage.getItem("gameView") || "ttt");

				// ===================
				// Leaderboard Storage (24h expiry)
				// ===================
				const LEADERBOARD_EXPIRY_MS = 24 * 60 * 60 * 1000;

				// TTT Leaderboard - per difficulty
				function getTttLeaderboard(difficulty) {
					try {
						const key = `tttLeaderboard_${difficulty}`;
						const raw = localStorage.getItem(key);
						if (!raw) return [];
						const data = JSON.parse(raw);
						if (Date.now() > data.expiry) {
							localStorage.removeItem(key);
							return [];
						}
						return Array.isArray(data.entries) ? data.entries : [];
					} catch {
						return [];
					}
				}

				function saveTttLeaderboard(difficulty, entries) {
					const key = `tttLeaderboard_${difficulty}`;
					const data = {
						expiry: Date.now() + LEADERBOARD_EXPIRY_MS,
						entries: entries.slice(0, 20),
					};
					localStorage.setItem(key, JSON.stringify(data));
				}

				function addTttWin(name, difficulty) {
					if (!name || !name.trim()) return;
					const cleanName = name.trim().substring(0, 12);
					const entries = getTttLeaderboard(difficulty);
					const existing = entries.find((e) => e.name.toLowerCase() === cleanName.toLowerCase());
					if (existing) {
						existing.wins += 1;
						existing.name = cleanName;
					} else {
						entries.push({ name: cleanName, wins: 1 });
					}
					entries.sort((a, b) => b.wins - a.wins);
					saveTttLeaderboard(difficulty, entries);
				}

				function getUserTttWins(name, difficulty) {
					if (!name || !name.trim()) return 0;
					const cleanName = name.trim().toLowerCase();
					const entries = getTttLeaderboard(difficulty);
					const entry = entries.find((e) => e.name.toLowerCase() === cleanName);
					return entry ? entry.wins : 0;
				}

				// Snake Leaderboard - high scores
				function getSnakeLeaderboard() {
					try {
						const raw = localStorage.getItem("snakeLeaderboard");
						if (!raw) return [];
						const data = JSON.parse(raw);
						if (Date.now() > data.expiry) {
							localStorage.removeItem("snakeLeaderboard");
							return [];
						}
						return Array.isArray(data.entries) ? data.entries : [];
					} catch {
						return [];
					}
				}

				function saveSnakeLeaderboard(entries) {
					const data = {
						expiry: Date.now() + LEADERBOARD_EXPIRY_MS,
						entries: entries.slice(0, 20),
					};
					localStorage.setItem("snakeLeaderboard", JSON.stringify(data));
				}

				function addSnakeScore(name, score) {
					if (!name || !name.trim() || score <= 0) return;
					const cleanName = name.trim().substring(0, 12);
					const entries = getSnakeLeaderboard();
					const existing = entries.find((e) => e.name.toLowerCase() === cleanName.toLowerCase());
					if (existing) {
						if (score > existing.score) {
							existing.score = score;
							existing.name = cleanName;
						}
					} else {
						entries.push({ name: cleanName, score: score });
					}
					entries.sort((a, b) => b.score - a.score);
					saveSnakeLeaderboard(entries);
				}

				function getUserSnakeBest(name) {
					if (!name || !name.trim()) return 0;
					const cleanName = name.trim().toLowerCase();
					const entries = getSnakeLeaderboard();
					const entry = entries.find((e) => e.name.toLowerCase() === cleanName);
					return entry ? entry.score : 0;
				}

				// ===================
				// TIC-TAC-TOE
				// ===================
				const HUMAN = "X";
				const BOT = "O";
				const COLS = ["A", "B", "C"];

				const tttDifficultyEl = document.getElementById("tttDifficulty");
				const tttResetEl = document.getElementById("tttReset");
				const tttStatusEl = document.getElementById("tttStatus");
				const tttBoardEl = document.getElementById("tttBoard");
				const tttCellEls = Array.from(tttBoardEl.querySelectorAll(".tttCell"));
				const tttMovesXEl = document.getElementById("tttMovesX");
				const tttMovesOEl = document.getElementById("tttMovesO");
				const tttLeaderboardEl = document.getElementById("tttLeaderboard");
				const tttLeaderboardModeEl = document.getElementById("tttLeaderboardMode");
				const tttUsernameEl = document.getElementById("tttUsername");
				const tttUserStatsEl = document.getElementById("tttUserStats");

				const WIN_LINES = [
					[0, 1, 2],
					[3, 4, 5],
					[6, 7, 8],
					[0, 3, 6],
					[1, 4, 7],
					[2, 5, 8],
					[0, 4, 8],
					[2, 4, 6],
				];

				let tttBoard = new Array(9).fill(null);
				let tttCurrent = HUMAN;
				let tttGameOver = false;
				let tttBotThinking = false;
				let tttMovesX = [];
				let tttMovesO = [];

				function indexToPos(index) {
					const col = COLS[index % 3];
					const row = Math.floor(index / 3) + 1;
					return `${col}${row}`;
				}

				function getDifficulty() {
					return String(tttDifficultyEl.value || "medium").toLowerCase();
				}

				function setTttStatus(text) {
					tttStatusEl.textContent = text;
				}

				function renderMoveHistory() {
					tttMovesXEl.innerHTML = tttMovesX.map((m) => `<li>${m}</li>`).join("");
					tttMovesOEl.innerHTML = tttMovesO.map((m) => `<li>${m}</li>`).join("");
				}

				function renderTttLeaderboard() {
					const diff = getDifficulty();
					const diffLabel = diff.toUpperCase();
					tttLeaderboardModeEl.textContent = `${diffLabel} MODE`;
					const entries = getTttLeaderboard(diff);
					if (entries.length === 0) {
						tttLeaderboardEl.innerHTML = `<li><span class="rank">—</span><span class="name">No data yet</span><span class="wins"></span></li>`;
						return;
					}
					tttLeaderboardEl.innerHTML = entries
						.slice(0, 10)
						.map((e, i) => `<li><span class="rank">${i + 1}.</span><span class="name">${e.name}</span><span class="wins">${e.wins}W</span></li>`)
						.join("");
				}

				function updateTttUserStats() {
					const name = tttUsernameEl.value;
					const easyWins = getUserTttWins(name, "easy");
					const medWins = getUserTttWins(name, "medium");
					const hardWins = getUserTttWins(name, "hard");
					tttUserStatsEl.textContent = `EASY: ${easyWins} | MED: ${medWins} | HARD: ${hardWins}`;
				}

				function getAvailableMoves(board) {
					const moves = [];
					for (let i = 0; i < board.length; i++) {
						if (board[i] === null) moves.push(i);
					}
					return moves;
				}

				function getWinner(board) {
					for (const line of WIN_LINES) {
						const [a, b, c] = line;
						if (board[a] && board[a] === board[b] && board[a] === board[c]) {
							return { winner: board[a], line };
						}
					}
					return { winner: null, line: null };
				}

				function isDraw(board) {
					return board.every((cell) => cell !== null) && getWinner(board).winner === null;
				}

				function clearWinHighlight() {
					for (const cellEl of tttCellEls) cellEl.classList.remove("win");
				}

				function highlightWinLine(line) {
					if (!line) return;
					for (const index of line) {
						tttCellEls[index].classList.add("win");
					}
				}

				function render() {
					for (let i = 0; i < tttCellEls.length; i++) {
						const value = tttBoard[i];
						tttCellEls[i].textContent = value ? value : "";
						tttCellEls[i].classList.remove("X", "O");
						if (value) tttCellEls[i].classList.add(value);
						tttCellEls[i].disabled = tttGameOver || tttBotThinking || value !== null;
					}
					renderMoveHistory();
				}

				function endGame(message, winLine, winner) {
					tttGameOver = true;
					tttBotThinking = false;
					clearWinHighlight();
					highlightWinLine(winLine);
					setTttStatus(message);
					render();

					if (winner === HUMAN) {
						const name = tttUsernameEl.value;
						const diff = getDifficulty();
						if (name && name.trim()) {
							addTttWin(name, diff);
							renderTttLeaderboard();
							updateTttUserStats();
						}
					}

					// Auto-restart after delay
					setTimeout(() => {
						startTttGame();
					}, 1800);
				}

				function makeMove(index, player) {
					if (tttBoard[index] !== null) return false;
					tttBoard[index] = player;
					const pos = indexToPos(index);
					if (player === HUMAN) {
						tttMovesX.push(pos);
					} else {
						tttMovesO.push(pos);
					}
					return true;
				}

				function maybeFinish() {
					const { winner, line } = getWinner(tttBoard);

					if (winner === HUMAN) {
						endGame("YOU WIN!", line, HUMAN);
						return true;
					}
					if (winner === BOT) {
						endGame("BOT WINS!", line, BOT);
						return true;
					}
					if (isDraw(tttBoard)) {
						endGame("IT'S A DRAW!", null, null);
						return true;
					}
					return false;
				}

				function pickRandom(moves) {
					return moves[Math.floor(Math.random() * moves.length)];
				}

				function findImmediateWin(player) {
					for (const move of getAvailableMoves(tttBoard)) {
						const trial = tttBoard.slice();
						trial[move] = player;
						if (getWinner(trial).winner === player) return move;
					}
					return null;
				}

				function pickMoveEasy() {
					return pickRandom(getAvailableMoves(tttBoard));
				}

				function pickMoveMedium() {
					const winNow = findImmediateWin(BOT);
					if (winNow !== null) return winNow;
					const blockNow = findImmediateWin(HUMAN);
					if (blockNow !== null) return blockNow;
					if (tttBoard[4] === null) return 4;
					const corners = [0, 2, 6, 8].filter((i) => tttBoard[i] === null);
					if (corners.length) return pickRandom(corners);
					return pickMoveEasy();
				}

				function minimax(board, depth, isMaximizing) {
					const { winner } = getWinner(board);
					if (winner === BOT) return 10 - depth;
					if (winner === HUMAN) return -10 + depth;
					if (board.every((c) => c !== null)) return 0;

					const moves = getAvailableMoves(board);
					if (isMaximizing) {
						let best = -Infinity;
						for (const move of moves) {
							const trial = board.slice();
							trial[move] = BOT;
							best = Math.max(best, minimax(trial, depth + 1, false));
						}
						return best;
					}

					let best = Infinity;
					for (const move of moves) {
						const trial = board.slice();
						trial[move] = HUMAN;
						best = Math.min(best, minimax(trial, depth + 1, true));
					}
					return best;
				}

				function pickMoveHard() {
					const moves = getAvailableMoves(tttBoard);
					let bestScore = -Infinity;
					let bestMoves = [];

					for (const move of moves) {
						const trial = tttBoard.slice();
						trial[move] = BOT;
						const score = minimax(trial, 0, false);
						if (score > bestScore) {
							bestScore = score;
							bestMoves = [move];
						} else if (score === bestScore) {
							bestMoves.push(move);
						}
					}
					return pickRandom(bestMoves);
				}

				function pickBotMove() {
					const diff = getDifficulty();
					if (diff === "easy") return pickMoveEasy();
					if (diff === "hard") return pickMoveHard();
					return pickMoveMedium();
				}

				function botPlay() {
					if (tttGameOver) return;
					if (tttCurrent !== BOT) return;

					tttBotThinking = true;
					setTttStatus("BOT IS THINKING…");
					render();

					setTimeout(() => {
						const move = pickBotMove();
						makeMove(move, BOT);
						tttBotThinking = false;
						if (maybeFinish()) return;
						tttCurrent = HUMAN;
						setTttStatus("YOUR TURN (X)");
						render();
					}, 400);
				}

				function startTttGame() {
					tttBoard = new Array(9).fill(null);
					tttCurrent = HUMAN;
					tttGameOver = false;
					tttBotThinking = false;
					tttMovesX = [];
					tttMovesO = [];
					clearWinHighlight();
					const diffLabel = getDifficulty().toUpperCase();
					setTttStatus(`YOUR TURN (X) - ${diffLabel}`);
					renderTttLeaderboard();
					render();
				}

				function onCellClick(event) {
					const target = event.target;
					if (!(target instanceof HTMLElement)) return;
					const indexStr = target.getAttribute("data-index");
					if (indexStr === null) return;
					const index = Number(indexStr);
					if (!Number.isFinite(index)) return;

					if (tttGameOver || tttBotThinking) return;
					if (tttCurrent !== HUMAN) return;
					if (!makeMove(index, HUMAN)) return;
					clearWinHighlight();
					if (maybeFinish()) return;
					tttCurrent = BOT;
					botPlay();
					render();
				}

				tttBoardEl.addEventListener("click", onCellClick);
				tttResetEl.addEventListener("click", startTttGame);
				tttDifficultyEl.addEventListener("change", () => {
					renderTttLeaderboard();
					startTttGame();
				});
				tttUsernameEl.addEventListener("input", updateTttUserStats);

				// Load saved username
				const savedTttName = localStorage.getItem("tttUsername") || "";
				tttUsernameEl.value = savedTttName;
				tttUsernameEl.addEventListener("change", () => {
					localStorage.setItem("tttUsername", tttUsernameEl.value);
				});
				// Press Enter on username to start new game
				tttUsernameEl.addEventListener("keydown", (e) => {
					if (e.key === "Enter") {
						e.preventDefault();
						localStorage.setItem("tttUsername", tttUsernameEl.value);
						startTttGame();
						tttUsernameEl.blur();
					}
				});

				renderTttLeaderboard();
				updateTttUserStats();
				startTttGame();

				// ===================
				// SNAKE GAME
				// ===================
				const snakeCanvas = document.getElementById("snakeCanvas");
				const snakeCtx = snakeCanvas.getContext("2d");
				const snakeSpeedEl = document.getElementById("snakeSpeed");
				const snakeToggleEl = document.getElementById("snakeToggle");
				const snakeResetEl = document.getElementById("snakeReset");
				const snakeStatusEl = document.getElementById("snakeStatus");
				const snakeStatsEl = document.getElementById("snakeStats");
				const snakeLeaderboardEl = document.getElementById("snakeLeaderboard");
				const snakeUsernameEl = document.getElementById("snakeUsername");
				const snakeUserStatsEl = document.getElementById("snakeUserStats");

				const GRID = 20;
				const CELL = Math.floor(snakeCanvas.width / GRID);

				let snake = [];
				let snakeDir = { x: 1, y: 0 };
				let pendingDir = null;
				let food = { x: 0, y: 0 };
				let snakeScore = 0;
				let snakeHigh = Number(localStorage.getItem("snakeHighScore") || "0") || 0;
				let snakeRunning = false;
				let snakeIntervalId = null;
				let snakeAlive = true;

				function setSnakeStatus(text) {
					snakeStatusEl.textContent = text.toUpperCase();
				}

				function updateSnakeStats() {
					snakeStatsEl.textContent = `SCORE: ${snakeScore} • HIGH: ${snakeHigh}`;
				}

				function renderSnakeLeaderboard() {
					const entries = getSnakeLeaderboard();
					if (entries.length === 0) {
						snakeLeaderboardEl.innerHTML = `<li><span class="rank">—</span><span class="name">No data yet</span><span class="score"></span></li>`;
						return;
					}
					snakeLeaderboardEl.innerHTML = entries
						.slice(0, 10)
						.map((e, i) => `<li><span class="rank">${i + 1}.</span><span class="name">${e.name}</span><span class="score">${e.score}</span></li>`)
						.join("");
				}

				function updateSnakeUserStats() {
					const name = snakeUsernameEl.value;
					const best = getUserSnakeBest(name);
					snakeUserStatsEl.textContent = `Best: ${best}`;
				}

				function snakeSpeedMs() {
					const v = String(snakeSpeedEl.value || "normal");
					if (v === "slow") return 140;
					if (v === "fast") return 75;
					return 105;
				}

				function sameDir(a, b) {
					return a && b && a.x === b.x && a.y === b.y;
				}

				function isOpposite(a, b) {
					return a && b && a.x === -b.x && a.y === -b.y;
				}

				function randCell() {
					return {
						x: Math.floor(Math.random() * GRID),
						y: Math.floor(Math.random() * GRID),
					};
				}

				function cellKey(p) {
					return `${p.x},${p.y}`;
				}

				function placeFood() {
					const occupied = new Set(snake.map(cellKey));
					let tries = 0;
					do {
						food = randCell();
						tries += 1;
					} while (occupied.has(cellKey(food)) && tries < 200);
				}

				function snakeReset(startRunning = false) {
					snake = [{ x: 9, y: 10 }, { x: 8, y: 10 }, { x: 7, y: 10 }];
					snakeDir = { x: 1, y: 0 };
					pendingDir = null;
					snakeScore = 0;
					snakeAlive = true;
					placeFood();
					updateSnakeStats();
					setSnakeStatus("Ready. Press Start.");
					snakeRender();
					if (startRunning) snakePlay();
					else snakePause();
				}

				function snakeRender() {
					snakeCtx.clearRect(0, 0, snakeCanvas.width, snakeCanvas.height);

					// Draw grid with neon cyan
					snakeCtx.save();
					snakeCtx.globalAlpha = 0.15;
					snakeCtx.strokeStyle = "#22d3ee";
					for (let i = 0; i <= GRID; i++) {
						const p = i * CELL;
						snakeCtx.beginPath();
						snakeCtx.moveTo(p, 0);
						snakeCtx.lineTo(p, GRID * CELL);
						snakeCtx.stroke();
						snakeCtx.beginPath();
						snakeCtx.moveTo(0, p);
						snakeCtx.lineTo(GRID * CELL, p);
						snakeCtx.stroke();
					}
					snakeCtx.restore();

					// Draw food with neon pink glow
					snakeCtx.shadowColor = "#ff6ec7";
					snakeCtx.shadowBlur = 12;
					snakeCtx.fillStyle = "#ff6ec7";
					snakeCtx.beginPath();
					snakeCtx.arc((food.x + 0.5) * CELL, (food.y + 0.5) * CELL, CELL * 0.35, 0, Math.PI * 2);
					snakeCtx.fill();
					snakeCtx.shadowBlur = 0;

					// Draw snake with neon green glow
					for (let i = 0; i < snake.length; i++) {
						const part = snake[i];
						const isHead = i === 0;
						snakeCtx.shadowColor = isHead ? "#39ff14" : "#22d3ee";
						snakeCtx.shadowBlur = isHead ? 14 : 8;
						snakeCtx.fillStyle = isHead ? "#39ff14" : "#22d3ee";
						snakeCtx.fillRect(part.x * CELL + 2, part.y * CELL + 2, CELL - 4, CELL - 4);
					}
					snakeCtx.shadowBlur = 0;
				}

				function snakeStep() {
					if (!snakeRunning || !snakeAlive) return;
					if (pendingDir && !isOpposite(pendingDir, snakeDir) && !sameDir(pendingDir, snakeDir)) {
						snakeDir = pendingDir;
					}
					pendingDir = null;

					const head = snake[0];
					const next = { x: head.x + snakeDir.x, y: head.y + snakeDir.y };
					if (next.x < 0 || next.y < 0 || next.x >= GRID || next.y >= GRID) {
						return snakeDie();
					}

					const body = new Set(snake.map(cellKey));
					if (body.has(cellKey(next))) {
						return snakeDie();
					}

					snake.unshift(next);
					const ate = next.x === food.x && next.y === food.y;
					if (ate) {
						snakeScore += 1;
						if (snakeScore > snakeHigh) {
							snakeHigh = snakeScore;
							localStorage.setItem("snakeHighScore", String(snakeHigh));
						}
						placeFood();
						setSnakeStatus("Nice! Keep going.");
						updateSnakeStats();
					} else {
						snake.pop();
					}

					snakeRender();
				}

				function snakeDie() {
					snakeAlive = false;
					snakePause();
					setSnakeStatus("Game over. Press New to try again.");
					// Save score to leaderboard
					const name = snakeUsernameEl.value;
					if (name && name.trim() && snakeScore > 0) {
						addSnakeScore(name, snakeScore);
						renderSnakeLeaderboard();
						updateSnakeUserStats();
					}
				}

				function snakePlay() {
					if (!snakeAlive) return;
					snakeRunning = true;
					snakeToggleEl.textContent = "PAUSE";
					setSnakeStatus("Playing…");
					if (snakeIntervalId) clearInterval(snakeIntervalId);
					snakeIntervalId = setInterval(snakeStep, snakeSpeedMs());
				}

				function snakePause() {
					snakeRunning = false;
					snakeToggleEl.textContent = "START";
					if (snakeIntervalId) {
						clearInterval(snakeIntervalId);
						snakeIntervalId = null;
					}
				}

				function snakeToggle() {
					if (!snakeAlive) return;
					if (snakeRunning) snakePause();
					else snakePlay();
				}

				function setPendingDir(dir) {
					if (!dir) return;
					if (isOpposite(dir, snakeDir)) return;
					pendingDir = dir;
				}

				snakeToggleEl.addEventListener("click", snakeToggle);
				snakeResetEl.addEventListener("click", () => snakeReset(true));
				snakeSpeedEl.addEventListener("change", () => {
					if (snakeRunning) snakePlay();
				});

				document.addEventListener("keydown", (e) => {
					const key = String(e.key || "").toLowerCase();
					if (key === "arrowup" || key === "w") setPendingDir({ x: 0, y: -1 });
					else if (key === "arrowdown" || key === "s") setPendingDir({ x: 0, y: 1 });
					else if (key === "arrowleft" || key === "a") setPendingDir({ x: -1, y: 0 });
					else if (key === "arrowright" || key === "d") setPendingDir({ x: 1, y: 0 });
					else return;
					e.preventDefault();
				});

				for (const btn of Array.from(document.querySelectorAll("[data-sdir]"))) {
					btn.addEventListener("click", () => {
						const d = btn.getAttribute("data-sdir");
						if (d === "up") setPendingDir({ x: 0, y: -1 });
						else if (d === "down") setPendingDir({ x: 0, y: 1 });
						else if (d === "left") setPendingDir({ x: -1, y: 0 });
						else if (d === "right") setPendingDir({ x: 1, y: 0 });
					});
				}

				// Load saved snake username
				const savedSnakeName = localStorage.getItem("snakeUsername") || "";
				snakeUsernameEl.value = savedSnakeName;
				snakeUsernameEl.addEventListener("change", () => {
					localStorage.setItem("snakeUsername", snakeUsernameEl.value);
				});
				snakeUsernameEl.addEventListener("input", updateSnakeUserStats);
				// Press Enter on snake username to start game
				snakeUsernameEl.addEventListener("keydown", (e) => {
					if (e.key === "Enter") {
						e.preventDefault();
						localStorage.setItem("snakeUsername", snakeUsernameEl.value);
						snakeReset(true);
						snakeUsernameEl.blur();
					}
				});

				renderSnakeLeaderboard();
				updateSnakeUserStats();
				snakeReset(false);
			})();
		</script>
	</body>
</html>
